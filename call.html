<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="server-url" content="https://delivery-saas-production-3fe6.up.railway.app">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Дзвінок</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f4f8; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; color: #333; overflow: hidden; }
        .call-card { background: white; border-radius: 20px 20px 0 0; padding: 30px 20px; box-shadow: 0 -8px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 400px; position: absolute; bottom: 0; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .icon-wrapper { background: #fff0ed; width: 80px; height: 80px; border-radius: 40px; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto; color: #ff7652; font-size: 35px; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
        .icon-wrapper::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: #ff7652; opacity: 0.3; animation: pulseCall 1.2s infinite; }
        @keyframes pulseCall { 0% { transform: scale(1); opacity: 0.3; } 100% { transform: scale(1.6); opacity: 0; } }
        h3 { margin: 0 0 6px 0; color: #1c1e21; font-size: 19px; }
        .subtitle { margin: 0 0 4px 0; color: #8a8d91; font-size: 14px; }
        .hint { font-size: 11px; color: #b0b3b8; margin-top: 6px; }
        .badge { display: inline-block; background: #fff0ed; color: #ff7652; border-radius: 8px; padding: 3px 10px; font-size: 12px; font-weight: 700; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="call-card">
        <div class="icon-wrapper">
            <i class="fa-solid fa-phone-volume"></i>
        </div>
        <h3 id="call-title">Дзвінок клієнту</h3>
        <p class="subtitle" id="call-subtitle">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Відкриття дзвінка...
        </p>
        <p class="hint" id="call-hint"></p>
        <div id="call-badge"></div>
    </div>

<script>
window.onload = function () {
    var params = new URLSearchParams(window.location.search);
    var code = params.get("code");

    if (!code) {
        document.getElementById('call-title').innerText = "Помилка";
        document.getElementById('call-subtitle').innerText = "Номер не передано.";
        return;
    }

    var digitsOnly = code.replace(/\D/g, '');

    // Uber-код: рівно 8 цифр — значить це не реальний номер,
    // а внутрішній Uber-код. Треба дзвонити на Uber і вводити код.
    if (/^\d{8}$/.test(digitsOnly)) {
        // Uber dispatcher number — номер Uber служби в твоїй країні.
        // Польща: 223076593 | Україна: 0800503580
        // Передається з URL ?dispatcher= або береться дефолтний
        var dispatcher = params.get("dispatcher") || "223076593";

        document.getElementById('call-title').innerText = "Uber Call";
        document.getElementById('call-subtitle').innerText = "Дзвінок через Uber диспетчера";
        document.getElementById('call-hint').innerText = "Телефон наберить Uber → введе ваш код → з'єднає з клієнтом";
        document.getElementById('call-badge').innerHTML = '<span class="badge">Код: ' + digitsOnly + '</span>';

        // tel: + номер Uber + кома (пауза 2с) + код + # (підтвердження)
        window.location.href = "tel:" + dispatcher + "," + digitsOnly + "#";

    } else {
        // Звичайний реальний номер — дзвонимо напряму
        document.getElementById('call-title').innerText = "Дзвінок клієнту";
        document.getElementById('call-subtitle').innerText = code;
        document.getElementById('call-hint').innerText = "Зараз телефон відкриє набір номера";

        window.location.href = "tel:" + code;
    }
};
</script>
</body>
</html>
