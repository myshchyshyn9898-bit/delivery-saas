<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Нове замовлення</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f4f7f9;
            --text-main: #111418;
            --text-muted: #8a8d91;
            --primary: #ff7652;
            --surface: #ffffff;
            --info: #4A6CF7;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-main); padding-bottom: 30px; } 

        .header { background: var(--surface); padding: 20px; border-bottom: 1px solid #edf1f7; position: sticky; top: 0; z-index: 10; text-align: center; font-size: 18px; font-weight: 800; }
        
        .container { padding: 20px; }
        
        .card { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #edf1f7; }
        .card-header { font-size: 15px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--primary); }

        .input-group { margin-bottom: 15px; }
        .input-field, .select-field { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #edf1f7; background: #fbfcfd; font-size: 15px; color: var(--text-main); outline: none; transition: 0.2s; }
        .input-field:focus, .select-field:focus { border-color: var(--primary); background: white; }
        
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }

        .chips-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .chip { padding: 10px 14px; border-radius: 10px; border: 2px solid #edf1f7; background: #fbfcfd; font-weight: 600; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: 0.2s; flex: 1; text-align: center; }
        .chip.active { background: rgba(255, 118, 82, 0.1); border-color: var(--primary); color: var(--primary); }

        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 8px 20px rgba(255, 118, 82, 0.25); transition: 0.2s; display: block;}
        .btn-submit:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div class="header">📝 Нове замовлення</div>

    <div class="container">
        <div class="card">
            <div class="card-header"><i class="fa-solid fa-user"></i> Клієнт</div>
            <div class="input-group">
                <input type="text" id="client-name" class="input-field" placeholder="Ім'я клієнта (напр. Олексій)">
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <input type="tel" id="client-phone" class="input-field" placeholder="Телефон (+48...)">
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fa-solid fa-location-dot"></i> Адреса доставки</div>
            <div class="input-group">
                <input type="text" id="address-street" class="input-field" placeholder="Вулиця (напр. Marszałkowska 12)">
            </div>
            <div class="row">
                <div class="input-group" style="margin-bottom: 0;"><input type="text" id="address-apt" class="input-field" placeholder="Квартира"></div>
                <div class="input-group" style="margin-bottom: 0;"><input type="text" id="address-code" class="input-field" placeholder="Домофон"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fa-solid fa-wallet"></i> Оплата</div>
            <div class="input-group">
                <input type="number" id="order-amount" class="input-field" placeholder="Сума замовлення (zł)">
            </div>
            <div class="chips-container" id="payment-chips">
                <div class="chip active" onclick="selectPayment(this, 'cash')">Готівка</div>
                <div class="chip" onclick="selectPayment(this, 'terminal')">Термінал</div>
                <div class="chip" onclick="selectPayment(this, 'online')">Онлайн</div>
            </div>
        </div>

        <div class="card" style="border-color: var(--info);">
            <div class="card-header" style="color: var(--info);"><i class="fa-solid fa-motorcycle"></i> Призначити кур'єра</div>
            <div class="input-group" style="margin-bottom: 0;">
                <select id="courier-select" class="select-field">
                    <option value="">⏳ Завантаження кур'єрів...</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="order-comment" class="input-field" placeholder="Коментар (необов'язково)">
        </div>

        <button class="btn-submit" id="btn-submit" onclick="submitOrder()">Створити та Відправити</button>
    </div>

    <script>
        // Ініціалізація Telegram
        let tg = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.expand();
            }
        } catch(e) {}

        const urlParams = new URLSearchParams(window.location.search);
        const bizId = urlParams.get('biz_id');
        
        // Робимо змінну глобальною
        window.selectedPayment = 'cash';

        // Ключі Supabase
        const SUPABASE_URL = 'https://kvanzkcwpwmfexsmldvx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2YW56a2N3cHdtZmV4c21sZHZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzgyMzksImV4cCI6MjA4OTYxNDIzOX0.ZHXB9-PwJhH07LzPGpxK0HD-BkLGlf5w2L4WbgrX4JA';
        let supabase = null;
        if (window.supabase) {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        // --- БРОНЕБІЙНІ ГЛОБАЛЬНІ ФУНКЦІЇ ---

        // Вибір оплати
        window.selectPayment = function(element, method) {
            document.querySelectorAll('#payment-chips .chip').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            window.selectedPayment = method;
        };

        // Завантаження кур'єрів
        window.loadCouriers = async function() {
            const select = document.getElementById('courier-select');
            if (!bizId || !supabase) {
                select.innerHTML = '<option value="">Помилка: Немає ID бізнесу</option>';
                return;
            }

            try {
                const { data: couriers, error } = await supabase
                    .from('staff')
                    .select('id, user_id, name')
                    .eq('business_id', bizId)
                    .eq('role', 'courier');

                if (couriers && couriers.length > 0) {
                    select.innerHTML = '<option value="" disabled selected>👉 Оберіть кур\'єра...</option>';
                    couriers.forEach(c => {
                        select.innerHTML += `<option value="${c.user_id}">🛵 ${c.name}</option>`;
                    });
                } else {
                    select.innerHTML = '<option value="">В штаті немає кур\'єрів!</option>';
                }
            } catch (err) {
                console.error(err);
                select.innerHTML = '<option value="">Помилка завантаження</option>';
            }
        };

        // Відправка
        window.submitOrder = function() {
            const street = document.getElementById('address-street').value.trim();
            const amount = document.getElementById('order-amount').value.trim();
            const courierId = document.getElementById('courier-select').value;

            if (!street || !amount || !courierId) {
                if (tg && tg.showAlert) tg.showAlert("📍 Введіть вулицю, суму та обов'язково оберіть кур'єра!");
                else alert("📍 Введіть вулицю, суму та обов'язково оберіть кур'єра!");
                return;
            }

            const orderData = {
                action: "new_order",
                biz_id: bizId,
                client_name: document.getElementById('client-name').value.trim() || "Клієнт",
                client_phone: document.getElementById('client-phone').value.trim(),
                address: street + (document.getElementById('address-apt').value ? `, кв. ${document.getElementById('address-apt').value}` : ''),
                code: document.getElementById('address-code').value.trim(),
                amount: amount,
                payment: window.selectedPayment, // Використовуємо глобальну змінну
                courier_id: courierId,
                comment: document.getElementById('order-comment').value.trim()
            };

            document.getElementById('btn-submit').innerText = "⏳ Відправляємо...";
            if (tg) {
                tg.sendData(JSON.stringify(orderData));
            } else {
                console.log("Тестовий режим:", orderData);
            }
        };

        // Запускаємо завантаження
        window.loadCouriers();
    </script>
</body>
</html>
