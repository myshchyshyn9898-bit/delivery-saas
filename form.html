<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Нове замовлення</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg-color: #f4f7f9; --text-main: #111418; --text-muted: #8a8d91; --primary: #ff7652; --surface: #ffffff; --info: #4A6CF7; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-main); padding-bottom: 30px; } 

        .header { background: var(--surface); padding: 20px; border-bottom: 1px solid #edf1f7; position: sticky; top: 0; z-index: 10; text-align: center; font-size: 18px; font-weight: 800; }
        .container { padding: 20px; }
        .card { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #edf1f7; }
        .card-header { font-size: 15px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--primary); }

        .input-group { margin-bottom: 15px; position: relative; }
        .input-field, .select-field { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #edf1f7; background: #fbfcfd; font-size: 15px; color: var(--text-main); outline: none; transition: 0.2s; }
        .input-field:focus, .select-field:focus { border-color: var(--primary); background: white; }
        
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }

        .chips-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .chips-container input[type="radio"] { display: none; }
        .chip { padding: 10px 14px; border-radius: 10px; border: 2px solid #edf1f7; background: #fbfcfd; font-weight: 600; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: 0.2s; flex: 1; text-align: center; display: block; }
        .chips-container input[type="radio"]:checked + .chip { background: rgba(255, 118, 82, 0.1); border-color: var(--primary); color: var(--primary); }

        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 8px 20px rgba(255, 118, 82, 0.25); transition: 0.2s; display: block; margin-top: 15px;}
        .btn-submit:active { transform: scale(0.96); }

        /* --- СТИЛІ ДЛЯ АВТОЗАПОВНЕННЯ АДРЕСИ --- */
        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 1px solid #edf1f7; z-index: 1000;
            max-height: 220px; overflow-y: auto; display: none; margin-top: 5px;
        }
        .autocomplete-item { padding: 12px 15px; border-bottom: 1px solid #edf1f7; cursor: pointer; font-size: 14px; line-height: 1.4; transition: 0.1s; }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:active { background: #f4f7f9; }
        .addr-main { font-weight: 800; color: #111418; margin-bottom: 2px; }
        .addr-sub { font-size: 12px; color: #8a8d91; }
    </style>
</head>
<body>

    <div class="header">📝 Нове замовлення v4</div>

    <div class="container">
        <div class="card">
            <div class="card-header"><i class="fa-solid fa-user"></i> Клієнт</div>
            <div class="input-group">
                <input type="text" id="client-name" class="input-field" placeholder="Ім'я клієнта (напр. Олексій)">
            </div>
            <div class="input-group" style="margin-bottom: 0;">
                <input type="tel" id="client-phone" class="input-field" placeholder="Телефон (+48...)">
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fa-solid fa-location-dot"></i> Адреса доставки</div>
            
            <div class="input-group">
                <input type="text" id="address-street" class="input-field" placeholder="Вулиця та номер (почніть вводити...)" autocomplete="off">
                <div id="autocomplete-list" class="autocomplete-list"></div>
            </div>

            <div class="row">
                <div class="input-group" style="margin-bottom: 0;"><input type="text" id="address-apt" class="input-field" placeholder="Квартира"></div>
                <div class="input-group" style="margin-bottom: 0;"><input type="text" id="address-code" class="input-field" placeholder="Домофон"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><i class="fa-solid fa-wallet"></i> Оплата</div>
            <div class="input-group">
                <input type="number" id="order-amount" class="input-field" placeholder="Сума замовлення (zł)">
            </div>
            <div class="chips-container">
                <input type="radio" id="pay-cash" name="payment" value="cash" checked>
                <label class="chip" for="pay-cash">Готівка</label>
                <input type="radio" id="pay-terminal" name="payment" value="terminal">
                <label class="chip" for="pay-terminal">Термінал</label>
                <input type="radio" id="pay-online" name="payment" value="online">
                <label class="chip" for="pay-online">Онлайн</label>
            </div>
        </div>

        <div class="card" style="border-color: var(--info);">
            <div class="card-header" style="color: var(--info);"><i class="fa-solid fa-motorcycle"></i> Призначити кур'єра</div>
            <div class="input-group" style="margin-bottom: 0;">
                <select id="courier-select" class="select-field">
                    <option value="">⏳ Завантаження кур'єрів...</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="order-comment" class="input-field" placeholder="Коментар (необов'язково)">
        </div>

        <button class="btn-submit" id="btn-submit" onclick="submitOrder()">Створити та Відправити</button>
    </div>

    <script>
        let tg = null;
        try { if (window.Telegram && window.Telegram.WebApp) { tg = window.Telegram.WebApp; tg.expand(); } } catch(e) {}

        const urlParams = new URLSearchParams(window.location.search);
        const bizId = urlParams.get('biz_id');

        const SUPABASE_URL = 'https://kvanzkcwpwmfexsmldvx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2YW56a2N3cHdtZmV4c21sZHZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzgyMzksImV4cCI6MjA4OTYxNDIzOX0.ZHXB9-PwJhH07LzPGpxK0HD-BkLGlf5w2L4WbgrX4JA';
        let supabaseClient = null;
        if (window.supabase) supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- ІНІЦІАЛІЗАЦІЯ (ЗМІНЕНО ТІЛЬКИ ЦЕ: ДОДАНО СТАТУСИ КУР'ЄРІВ) ---
        async function initForm() {
            if (!bizId || !supabaseClient) return;
            try {
                const { data: couriers } = await supabaseClient.from('staff').select('*').eq('business_id', bizId).eq('role', 'courier');
                const { data: activeOrders } = await supabaseClient.from('orders').select('courier_id').eq('business_id', bizId).eq('status', 'pending');
                
                const select = document.getElementById('courier-select');
                if (couriers && couriers.length > 0) {
                    select.innerHTML = '<option value="" disabled selected>👉 Оберіть кур\'єра...</option>';
                    
                    const busyIds = activeOrders ? activeOrders.map(o => String(o.courier_id)) : [];
                    
                    couriers.forEach(c => { 
                        const isBusy = busyIds.includes(String(c.user_id));
                        const statusText = isBusy ? "🟡 В дорозі" : "🟢 Вільний";
                        select.innerHTML += `<option value="${c.user_id || c.tg_id}">🛵 ${c.name} (${statusText})</option>`; 
                    });
                } else {
                    select.innerHTML = '<option value="">📭 В штаті немає кур\'єрів!</option>';
                }
            } catch(e) { console.error(e); }
        }

        // --- ЛОГІКА АВТОЗАПОВНЕННЯ АДРЕС (NOMINATIM ПОЛЬЩА) ---
        const addrInput = document.getElementById('address-street');
        const addrList = document.getElementById('autocomplete-list');
        let timeout = null;

        addrInput.addEventListener('input', function() {
            clearTimeout(timeout);
            const query = this.value.trim();
            
            if (query.length < 3) { 
                addrList.style.display = 'none'; 
                return; 
            }

            // Показуємо користувачу, що йде пошук
            addrList.innerHTML = '<div class="autocomplete-item" style="color: var(--primary); text-align: center; font-weight: 600;"><i class="fa-solid fa-spinner fa-spin"></i> Шукаємо адресу...</div>';
            addrList.style.display = 'block';

            timeout = setTimeout(async () => {
                // Використовуємо надійний Nominatim з прив'язкою до Польщі (countrycodes=pl)
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&addressdetails=1&limit=5&countrycodes=pl`;
                
                try {
                    const res = await fetch(url, { headers: { 'Accept-Language': 'pl' } });
                    const data = await res.json();
                    
                    if (data && data.length > 0) {
                        addrList.innerHTML = ''; // Очищаємо список
                        
                        data.forEach(item => {
                            const addr = item.address;
                            if (!addr) return;

                            // Витягуємо вулицю і номер
                            const road = addr.road || addr.pedestrian || addr.path || addr.suburb || item.name;
                            const house = addr.house_number || '';
                            const mainText = `${road} ${house}`.trim();
                            
                            // Витягуємо місто
                            const city = addr.city || addr.town || addr.village || '';
                            const subText = city ? `${city}, Польща` : 'Польща';
                            
                            if (!road) return; // Пропускаємо, якщо немає назви вулиці
                            
                            const div = document.createElement('div');
                            div.className = 'autocomplete-item';
                            div.innerHTML = `<div class="addr-main">${mainText}</div><div class="addr-sub">${subText}</div>`;
                            
                            // Що відбувається при кліку на підказку
                            div.onclick = function() {
                                // Записуємо "Вулиця Номер, Місто"
                                addrInput.value = `${mainText}, ${city}`.replace(/, $/, '');
                                addrList.style.display = 'none';
                            };
                            addrList.appendChild(div);
                        });
                    } else {
                        addrList.innerHTML = '<div class="autocomplete-item" style="color: #8a8d91; text-align: center;">Нічого не знайдено 😕</div>';
                    }
                } catch(e) { 
                    addrList.innerHTML = '<div class="autocomplete-item" style="color: #ff3b30; text-align: center;">❌ Помилка пошуку</div>';
                }
            }, 600); // Чекаємо 600мс (щоб не блокувало API за спам)
        });

        // Ховаємо список при кліку поза ним
        document.addEventListener('click', function(e) {
            if (e.target !== addrInput && e.target !== addrList) addrList.style.display = 'none';
        });

        // --- ВІДПРАВКА ЗАМОВЛЕННЯ ---
        window.submitOrder = function() {
            const street = document.getElementById('address-street').value.trim();
            const apt = document.getElementById('address-apt').value.trim();
            const code = document.getElementById('address-code').value.trim();
            
            const amount = document.getElementById('order-amount').value.trim();
            const courierId = document.getElementById('courier-select').value;
            const selectedPayment = document.querySelector('input[name="payment"]:checked').value;

            if (!street || !amount || !courierId) {
                if (tg && tg.showAlert) tg.showAlert("📍 Введіть вулицю, суму та обов'язково оберіть кур'єра!");
                else alert("📍 Введіть вулицю, суму та обов'язково оберіть кур'єра!");
                return;
            }

            const orderData = {
                action: "new_order",
                biz_id: bizId,
                client_name: document.getElementById('client-name').value.trim() || "Клієнт",
                client_phone: document.getElementById('client-phone').value.trim(),
                address: street, // ТЕПЕР ТУТ ТІЛЬКИ ЧИСТА ВУЛИЦЯ ДЛЯ GPS!
                apt: apt,        
                code: code,      
                amount: amount,
                payment: selectedPayment,
                courier_id: courierId,
                comment: document.getElementById('order-comment').value.trim()
            };

            document.getElementById('btn-submit').innerText = "⏳ Відправляємо...";
            
            if (tg && tg.sendData) tg.sendData(JSON.stringify(orderData));
            else console.log("Тестовий режим:", orderData);
        };

        initForm();
    </script>
</body>
</html>
