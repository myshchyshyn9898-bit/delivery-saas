<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта Замовлень | DeliPro</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #ff7652; 
            --info: #3b82f6; 
            --danger: #ef4444; 
            --bg: #f4f4f8; 
        }

        body { 
            margin: 0; 
            padding: 0; 
            font-family: sans-serif; 
            background: var(--bg); 
            overflow: hidden; 
        }
        
        #loading-screen { 
            position: absolute; 
            inset: 0; 
            background: white; 
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: #333; 
            text-align: center;
            padding: 20px;
        }

        .spinner { 
            font-size: 40px; 
            color: var(--primary); 
            margin-bottom: 15px; 
        }
        
        #map { 
            position: absolute; 
            inset: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 0; 
        }
        
        .custom-marker { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer; 
            transition: transform 0.2s; 
        }

        .custom-marker:active { 
            transform: scale(0.9); 
        }

        .marker-label { 
            background: white; 
            padding: 4px 8px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            font-size: 13px; 
            font-weight: bold; 
            color: #333; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            margin-bottom: 4px; 
            white-space: nowrap; 
        }
        
        .time-badge { 
            background: #fff0ed; 
            color: var(--primary); 
            padding: 2px 6px; 
            border-radius: 6px; 
            font-size: 11px; 
            display: flex; 
            align-items: center; 
            gap: 4px; 
            font-weight: bold;
        }

        .time-badge.late { 
            background: #fee2e2; 
            color: var(--danger); 
            animation: pulseRed 2s infinite;
        }
        
        @keyframes pulseRed { 
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 
            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } 
        }

        .pin-icon { 
            font-size: 28px; 
            filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.3)); 
        }
        .pin-free { color: var(--info); animation: bounce 2s infinite; }
        .pin-mine { color: #f59e0b; }
        .pin-others { color: #94a3b8; font-size: 24px; opacity: 0.8; }
        
        @keyframes bounce { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-5px); } 
        }
        
        .bottom-sheet { 
            position: absolute; 
            bottom: -120%; 
            left: 0; 
            right: 0; 
            background: white; 
            border-radius: 20px 20px 0 0; 
            padding: 20px; 
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15); 
            transition: bottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            z-index: 10; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .bottom-sheet.active { 
            bottom: 0; 
        }

        .sheet-handle { 
            width: 40px; 
            height: 5px; 
            background: #cbd5e1; 
            border-radius: 5px; 
            margin: 0 auto 10px; 
        }
        
        .sheet-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
        }

        .sheet-title { 
            margin: 0; 
            font-size: 18px; 
            color: #222; 
            font-weight: bold;
        }

        .sheet-info-row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 15px; 
            color: #555; 
            background: #f8fafc; 
            padding: 10px; 
            border-radius: 10px; 
            border: 1px solid #eee;
        }

        .sheet-info-row i { 
            color: var(--primary); 
            width: 20px; 
            text-align: center; 
            font-size: 16px; 
        }

        .btn-take { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 5px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px; 
            width: 100%;
        }

        .btn-take:active { 
            background: #e86343; 
        }

        .btn-cancel { 
            background: transparent; 
            color: #888; 
            border: none; 
            padding: 10px; 
            font-size: 14px; 
            cursor: pointer; 
            width: 100%;
            font-weight: bold;
        }

        .select-courier { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid #ddd; 
            font-size: 15px; 
            font-weight: bold; 
            background: #f8fafc; 
            color: #333; 
            outline: none; 
            margin-top: 5px; 
        }
        
        #role-badge { 
            position: absolute; 
            top: 15px; 
            left: 15px; 
            background: rgba(255,255,255,0.9); 
            padding: 8px 12px; 
            border-radius: 10px; 
            font-size: 12px; 
            font-weight: bold; 
            color: #333;
            z-index: 5; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <i class="fa-solid fa-circle-notch fa-spin spinner"></i>
    <div id="load-text" style="font-weight: bold; font-size: 16px;">Завантаження карти...</div>
    <div id="error-text" style="color: red; font-size: 13px; margin-top: 10px; font-weight: bold; white-space: pre-wrap;"></div>
</div>

<div id="role-badge">Шукаю доступ...</div>
<div id="map"></div>

<div id="bottom-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <h3 id="panel-address" class="sheet-title">Адреса</h3>
        <div id="panel-time" class="time-badge">🕒 0 хв</div>
    </div>
    
    <div class="sheet-info-row" id="panel-courier-row" style="display: none;">
        <i class="fa-solid fa-motorcycle"></i><span id="panel-courier">Кур'єр: -</span>
    </div>
    <div class="sheet-info-row">
        <i id="panel-pay-icon" class="fa-solid fa-wallet"></i><strong id="panel-pay">Оплата</strong>
    </div>

    <div id="admin-actions" style="display: none;">
        <select id="courier-select" class="select-courier"></select>
        <button id="btn-assign" class="btn-take" style="background: var(--info);">
            <i class="fa-solid fa-paper-plane"></i> Призначити
        </button>
    </div>

    <div id="courier-actions" style="display: none;">
        <button id="btn-route" class="btn-take">
            <i class="fa-solid fa-map-location-dot"></i> Побудувати маршрут
        </button>
    </div>

    <button id="btn-cancel" class="btn-cancel">Сховати</button>
</div>

<script>
    function logError(text) {
        var errText = document.getElementById("error-text");
        if (errText) errText.innerText += "🚨 " + text + "\n";
        console.error(text);
    }

    var MAPBOX_TOKEN = 'pk.eyJ1IjoibXlzaGNoeXNoeW45ODk4IiwiYSI6ImNtbmh3bnVzeTA2anIyd3NtNGR4YjQ3c2wifQ.vF1Do_h-OFFsyRsM5OQyMg';

    var RAILWAY_DOMAIN = "https://delipro-bot-production.up.railway.app";
    var _supabaseCfgCache = null;
    async function getSupabaseCfg() {
        if (!_supabaseCfgCache) {
            var res;
            try {
                res = await fetch(RAILWAY_DOMAIN + '/config');
            } catch (networkErr) {
                throw new Error("Сервер недоступний (" + RAILWAY_DOMAIN + "): " + networkErr.message);
            }
            if (!res.ok) {
                throw new Error("Помилка /config: HTTP " + res.status + " " + res.statusText);
            }
            var cfg;
            try {
                cfg = await res.json();
            } catch (jsonErr) {
                throw new Error("Невірна відповідь /config (не JSON): " + jsonErr.message);
            }
            if (!cfg.supabase_url || !cfg.supabase_key) {
                throw new Error("Відповідь /config не містить supabase_url або supabase_key");
            }
            _supabaseCfgCache = cfg;
        }
        return _supabaseCfgCache;
    }

    var map, markers = [], selectedOrder = null;
    var tg, supabase, userRole = 'courier', userId, bizData;
    var availableCouriers = [];
    var timerInterval = null;
    var activeOrdersData = [];

    var urlParams = new URLSearchParams(window.location.search);
    var bizId = urlParams.get('biz_id');
    var tgId = urlParams.get('tg_id');
    var authToken = urlParams.get('token');

    // ТОЧНО ЯК У ВЕРСІЇ 1.0:
    document.addEventListener("DOMContentLoaded", async function() {
        try {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            if (tg.setHeaderColor) tg.setHeaderColor('#ffffff');

            userId = tgId || (tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null);

            if (!bizId || !authToken) {
                document.getElementById('load-text').innerText = "Помилка: Немає токена доступу";
                return;
            }

            if (!window.supabase) {
                document.getElementById('load-text').innerText = "Помилка: Supabase SDK не підключена.";
                logError("window.supabase відсутній — перевірте CDN підключення");
                return;
            }

            var cfg;
            try {
                document.getElementById('load-text').innerText = "Підключення до сервера...";
                cfg = await getSupabaseCfg();
            } catch (cfgErr) {
                document.getElementById('load-text').innerText = "Помилка підключення до сервера";
                logError(cfgErr.message);
                return;
            }

            supabase = window.supabase.createClient(cfg.supabase_url, cfg.supabase_key, {
                global: { headers: { Authorization: 'Bearer ' + authToken } }
            });

            document.getElementById('btn-cancel').onclick = function() {
                document.getElementById('bottom-sheet').classList.remove('active');
            };

            document.getElementById('btn-route').onclick = function() {
                if (!selectedOrder) return;
                var encodedAddr = encodeURIComponent(selectedOrder.address);
                var url = "https://www.google.com/maps/dir/?api=1&destination=" + encodedAddr;
                tg.openLink(url);
            };

            document.getElementById('btn-assign').onclick = async function() {
                var cId = document.getElementById('courier-select').value;
                if (!cId || !selectedOrder) return tg.showAlert("Оберіть кур'єра!");

                var btn = document.getElementById('btn-assign');
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Обробка...';

                try {
                    var result = await supabase.from('orders').update({ courier_id: cId }).eq('id', selectedOrder.id);
                    if (result.error) throw result.error;
                    
                    tg.sendData(JSON.stringify({ 
                        action: "assign_order", 
                        order_id: selectedOrder.id, 
                        courier_id: cId 
                    }));
                    
                    tg.showAlert("Замовлення призначено!");
                    document.getElementById('bottom-sheet').classList.remove('active');
                    loadOrders();
                } catch (e) {
                    tg.showAlert("Помилка: " + e.message);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Призначити';
                }
            };

            // Запускаємо логіку після короткої паузи (як у 1.0)
            setTimeout(initMapAndData, 100);

        } catch (err) {
            document.getElementById('load-text').innerText = "Помилка запуску";
            logError("Помилка старту: " + (err.message || String(err)));
        }
    });

    async function initMapAndData() {
        try {
            var bizRes = await supabase.from('businesses').select('*').eq('id', bizId).single();
            if (bizRes.error) throw new Error("Бізнес не знайдено: " + bizRes.error.message);
            bizData = bizRes.data;

            if (bizData && String(bizData.owner_id) === String(userId)) {
                userRole = 'admin';
                document.getElementById('role-badge').innerHTML = '👑 <b>Режим Адміна</b>';
            } else {
                var staffRes = await supabase.from('staff').select('*').eq('user_id', userId).eq('business_id', bizId).single();
                var staff = staffRes.data;
                
                if (staff && staff.role === 'manager') {
                    userRole = 'admin';
                    document.getElementById('role-badge').innerHTML = '👨‍💼 <b>Режим Менеджера</b>';
                } else if (staff && staff.role === 'courier') {
                    userRole = 'courier';
                    document.getElementById('role-badge').innerHTML = '🛵 <b>Кур\'єр:</b> ' + staff.name;
                } else {
                    document.getElementById('role-badge').innerHTML = '❓ Гість';
                }
            }

            if (userRole === 'admin') {
                var couriersRes = await supabase.from('staff').select('*').eq('business_id', bizId).eq('role', 'courier');
                availableCouriers = couriersRes.data || [];
                var select = document.getElementById('courier-select');
                select.innerHTML = '<option value="" disabled selected>Оберіть кур\'єра...</option>';
                availableCouriers.forEach(function(c) {
                    var opt = document.createElement('option');
                    opt.value = c.user_id || c.tg_id;
                    opt.textContent = c.name;
                    select.appendChild(opt);
                });
            }

            if (!window.mapboxgl) {
                document.getElementById('load-text').innerText = "Помилка: Mapbox не завантажився.";
                return;
            }

            mapboxgl.accessToken = MAPBOX_TOKEN;
            if (!mapboxgl.supported()) {
                document.getElementById('load-text').innerText = "Ваш телефон не підтримує 3D карти.";
                return;
            }

            var bLng = parseFloat(bizData.lng) || 21.99901;
            var bLat = parseFloat(bizData.lat) || 50.04132;

            map = new mapboxgl.Map({
                container: 'map',
                style: 'mapbox://styles/mapbox/streets-v12',
                center: [bLng, bLat],
                zoom: 13
            });

            var bizEl = document.createElement('div');
            bizEl.innerHTML = '<div style="color: #ff7652; font-size: 28px;"><i class="fa-solid fa-store"></i></div>';
            new mapboxgl.Marker(bizEl).setLngLat([bLng, bLat]).addTo(map);

            map.on('click', function() {
                document.getElementById('bottom-sheet').classList.remove('active');
            });

            map.on('load', function() {
                document.getElementById('loading-screen').style.display = 'none';
                loadOrders();
                setInterval(loadOrders, 15000); 
                if(timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(updateAllTimers, 60000);
            });

        } catch (e) {
            document.getElementById('load-text').innerText = "Помилка ініціалізації";
            logError(e.message || String(e));
        }
    }

    async function loadOrders() {
        try {
            var res = await supabase.from('orders').select('*').eq('business_id', bizId).eq('status', 'pending');
            if (res.error) throw res.error;
            activeOrdersData = res.data || [];
            drawMarkers();
        } catch (e) {
            console.error("Завантаження замовлень:", e);
        }
    }

    function calculateTimeDiff(createdAtStr, estTimeMins) {
        var cleanStr = createdAtStr.split('.')[0].replace(' ', 'T').split('+')[0];
        var createdDate = new Date(cleanStr + 'Z'); 
        var deadline = new Date(createdDate.getTime() + (estTimeMins * 60000));
        var now = new Date();
        return Math.ceil((deadline - now) / 60000);
    }

    function drawMarkers() {
        markers.forEach(function(m) { m.remove(); });
        markers = [];

        activeOrdersData.forEach(function(order) {
            if (!order.lat || !order.lon) return;

            var isUnassigned = !order.courier_id || order.courier_id === 'unassigned';
            var isMine = String(order.courier_id) === String(userId);
            
            if (userRole === 'courier' && !isMine && !isUnassigned) return;

            var diffMins = calculateTimeDiff(order.created_at, order.est_time || 30);
            var isLate = diffMins < 0;

            var el = document.createElement('div');
            el.className = 'custom-marker';

            var pinClass = 'pin-free';
            var labelOpacity = '1';

            if (userRole === 'admin') {
                if (!isUnassigned) {
                    pinClass = 'pin-others';
                    labelOpacity = '0.7';
                }
            } else {
                if (isMine) pinClass = 'pin-mine';
            }

            var shortAddr = order.address.split(',')[0];
            var badgeClass = isLate ? 'time-badge late' : 'time-badge';
            var timeText = isLate ? diffMins + ' 🔥' : '🕒 ' + diffMins + ' хв';

            el.innerHTML = '<div class="marker-label" style="opacity: ' + labelOpacity + '"><span>' + shortAddr + '</span>' +
                '<span class="' + badgeClass + '" data-created="' + order.created_at + '" data-est="' + (order.est_time || 30) + '">' + timeText + '</span></div>' +
                '<div class="pin-icon ' + pinClass + '"><i class="fa-solid fa-location-dot"></i></div>';

            el.onclick = function(e) {
                e.stopPropagation();
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                
                selectedOrder = order;
                document.getElementById('panel-address').innerText = shortAddr;
                
                var pTime = document.getElementById('panel-time');
                pTime.className = badgeClass;
                pTime.innerText = timeText;

                var payStr = "Онлайн"; var payIcon = "fa-globe";
                if (order.pay_type === 'cash') { payStr = 'Готівка: ' + order.amount; payIcon = "fa-money-bill-wave"; }
                else if (order.pay_type === 'terminal') { payStr = 'Термінал: ' + order.amount; payIcon = "fa-credit-card"; }
                document.getElementById('panel-pay').innerText = payStr;
                document.getElementById('panel-pay-icon').className = 'fa-solid ' + payIcon;

                if (userRole === 'admin') {
                    document.getElementById('courier-actions').style.display = 'none';
                    if (isUnassigned) {
                        document.getElementById('admin-actions').style.display = 'block';
                        document.getElementById('panel-courier-row').style.display = 'none';
                        document.getElementById('courier-select').value = "";
                    } else {
                        document.getElementById('admin-actions').style.display = 'none';
                        document.getElementById('panel-courier-row').style.display = 'flex';
                        var c = availableCouriers.find(function(curr) { return String(curr.user_id) === String(order.courier_id); });
                        document.getElementById('panel-courier').innerHTML = "Кур'єр: <b>" + (c ? c.name : 'Призначено') + "</b>";
                    }
                } else {
                    document.getElementById('admin-actions').style.display = 'none';
                    document.getElementById('panel-courier-row').style.display = 'none';
                    document.getElementById('courier-actions').style.display = 'block';
                }

                document.getElementById('bottom-sheet').classList.add('active');
                map.flyTo({ center: [order.lon, order.lat], zoom: 15, speed: 1.2 });
            };

            var marker = new mapboxgl.Marker(el).setLngLat([order.lon, order.lat]).addTo(map);
            markers.push(marker);
        });
    }

    function updateAllTimers() {
        var badges = document.querySelectorAll('.time-badge[data-created]');
        badges.forEach(function(badge) {
            var createdAt = badge.getAttribute('data-created');
            var estTime = parseInt(badge.getAttribute('data-est'));
            if(createdAt && estTime) {
                var diffMins = calculateTimeDiff(createdAt, estTime);
                if(diffMins < 0) {
                    badge.className = 'time-badge late';
                    badge.innerText = diffMins + ' 🔥';
                } else {
                    badge.className = 'time-badge';
                    badge.innerText = '🕒 ' + diffMins + ' хв';
                }
            }
        });
    }
</script>
</body>
</html>
