<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта Замовлень | DeliPro</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary: #ff6b4a; --info: #3b82f6; --success: #10b981; --danger: #ef4444; --surface: #ffffff; --bg: #f8fafc; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); overflow: hidden; }
        
        #loading-screen { position: absolute; inset: 0; background: var(--surface); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #0f172a; }
        .spinner { font-size: 40px; color: var(--primary); margin-bottom: 15px; }
        
        #map { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
        
        /* Маркери на карті */
        .custom-marker { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .custom-marker:active { transform: scale(0.9); }
        .marker-label { background: var(--surface); padding: 4px 8px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px; font-weight: 800; color: #0f172a; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 6px; margin-bottom: 4px; white-space: nowrap; }
        
        .time-badge { padding: 2px 6px; border-radius: 6px; font-size: 12px; font-weight: 900; }
        .time-ok { background: #f1f5f9; color: #64748b; }
        .time-late { background: rgba(239, 68, 68, 0.15); color: var(--danger); animation: pulseRed 2s infinite; }
        
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        /* Кольори пінів залежно від статусу */
        .pin-free { color: var(--info); font-size: 32px; filter: drop-shadow(0px 4px 6px rgba(59, 130, 246, 0.4)); animation: bounce 2s infinite; }
        .pin-mine { color: #f59e0b; font-size: 32px; filter: drop-shadow(0px 4px 6px rgba(245, 158, 11, 0.4)); }
        .pin-others { color: #94a3b8; font-size: 24px; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.2)); opacity: 0.8; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        /* Нижня панель */
        .bottom-sheet { position: absolute; bottom: -120%; left: 0; right: 0; background: var(--surface); border-radius: 24px 24px 0 0; padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); transition: bottom 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 10; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid #e2e8f0; }
        .bottom-sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #cbd5e1; border-radius: 5px; margin: 0 auto 10px; }
        
        .sheet-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .sheet-title { margin: 0; font-size: 18px; font-weight: 900; color: #0f172a; }
        .sheet-info-row { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: #475569; background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .sheet-info-row i { color: var(--primary); width: 20px; text-align: center; font-size: 16px; }
        
        .btn-main { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(255, 107, 74, 0.3); transition: 0.2s; }
        .btn-main:active { transform: scale(0.97); }
        .btn-secondary { background: #f1f5f9; color: #475569; border: none; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-secondary:active { transform: scale(0.97); background: #e2e8f0; }

        .select-courier { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid var(--info); font-size: 15px; font-weight: 700; background: rgba(59, 130, 246, 0.05); color: #0f172a; outline: none; margin-top: 10px; }
        
        #role-badge { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.9); padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: 900; z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<div id="loading-screen">
    <i class="fa-solid fa-circle-notch fa-spin spinner"></i>
    <div id="load-text" style="font-weight: 800; font-size: 15px;">Завантаження карти...</div>
</div>

<div id="role-badge">Шукаю доступ...</div>
<div id="map"></div>

<div id="bottom-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <h3 id="panel-address" class="sheet-title">Адреса</h3>
        <div id="panel-time" class="time-badge time-ok">0 хв</div>
    </div>
    
    <div class="sheet-info-row" id="panel-courier-row" style="display: none;">
        <i class="fa-solid fa-motorcycle"></i><span id="panel-courier">Кур'єр: -</span>
    </div>
    <div class="sheet-info-row">
        <i id="panel-pay-icon" class="fa-solid fa-wallet"></i><strong id="panel-pay">Оплата</strong>
    </div>

    <div id="admin-actions" style="display: none;">
        <select id="courier-select" class="select-courier">
            <option value="" disabled selected>Оберіть кур'єра для призначення...</option>
        </select>
        <button id="btn-assign" class="btn-main" style="background: var(--info); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);"><i class="fa-solid fa-paper-plane"></i> Призначити</button>
    </div>

    <div id="courier-actions" style="display: none;">
        <button id="btn-route" class="btn-secondary"><i class="fa-solid fa-map-location-dot"></i> Побудувати маршрут</button>
    </div>

    <button id="btn-cancel" class="btn-secondary" style="background: transparent; box-shadow: none; margin-top: 0; color: #94a3b8;">Сховати</button>
</div>

<script>
    const MAPBOX_TOKEN = 'pk.eyJ1IjoibXlzaGNoeXNoeW45ODk4IiwiYSI6ImNtbmh3bnVzeTA2anIyd3NtNGR4YjQ3c2wifQ.vF1Do_h-OFFsyRsM5OQyMg';
    const SUPABASE_URL = 'https://kvanzkcwpwmfexsmldvx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2YW56a2N3cHdtZmV4c21sZHZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzgyMzksImV4cCI6MjA4OTYxNDIzOX0.ZHXB9-PwJhH07LzPGpxK0HD-BkLGlf5w2L4WbgrX4JA';

    let map, markers = [], selectedOrder = null;
    let tg, supabase, userRole = 'courier', userId = null, bizData = null;
    let availableCouriers = [];
    
    // Інтервал для оновлення таймерів
    let timerInterval = null;
    let activeOrdersData = [];

    const urlParams = new URLSearchParams(window.location.search);
    const bizId = urlParams.get('biz_id');
    const tgId = urlParams.get('tg_id');
    const authToken = urlParams.get('token');

    document.addEventListener("DOMContentLoaded", async () => {
        tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.setHeaderColor) tg.setHeaderColor('#ffffff');

        userId = tgId || (tg.initDataUnsafe?.user?.id);

        if (!bizId || !authToken) {
            document.getElementById('load-text').innerText = "Помилка доступу (Немає токена)";
            return;
        }

        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            global: { headers: { Authorization: `Bearer ${authToken}` } }
        });

        await determineRoleAndInit();
        
        document.getElementById('btn-cancel').onclick = closePanel;
        
        // Кнопка АДМІНА (Призначити)
        document.getElementById('btn-assign').onclick = async () => {
            const cId = document.getElementById('courier-select').value;
            if (!cId) return tg.showAlert("Оберіть кур'єра!");
            if (!selectedOrder) return;

            const btn = document.getElementById('btn-assign');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Призначаємо...';
            
            // Оновлюємо базу
            await supabase.from('orders').update({ courier_id: cId }).eq('id', selectedOrder.id);
            
            // Відправляємо сигнал в Telegram (через sendData)
            tg.sendData(JSON.stringify({
                action: "assign_order",
                order_id: selectedOrder.id,
                courier_id: cId
            }));
            
            tg.showAlert("Успішно призначено!");
            closePanel();
            loadOrders(); // Перемальовуємо карту
        };

        // Кнопка КУР'ЄРА (Маршрут)
        document.getElementById('btn-route').onclick = () => {
            if (!selectedOrder) return;
            const url = `https://www.google.com/maps/dir/?api=1&destination=${selectedOrder.lat},${selectedOrder.lon}&travelmode=driving`;
            tg.openLink(url);
        };
    });

    async function determineRoleAndInit() {
        try {
            // Перевіряємо чи це власник
            const { data: biz } = await supabase.from('businesses').select('*').eq('id', bizId).single();
            bizData = biz;

            if (biz && String(biz.owner_id) === String(userId)) {
                userRole = 'admin';
                document.getElementById('role-badge').innerHTML = '👑 <b>Режим Адміна</b> (Радар)';
            } else {
                // Перевіряємо чи менеджер
                const { data: staff } = await supabase.from('staff').select('role, name').eq('user_id', userId).eq('business_id', bizId).single();
                if (staff && staff.role === 'manager') {
                    userRole = 'admin';
                    document.getElementById('role-badge').innerHTML = '👨‍💼 <b>Режим Менеджера</b>';
                } else if (staff && staff.role === 'courier') {
                    userRole = 'courier';
                    document.getElementById('role-badge').innerHTML = `🛵 <b>Кур'єр:</b> ${staff.name}`;
                } else {
                    document.getElementById('role-badge').innerHTML = '❓ Невідома роль';
                }
            }

            if (userRole === 'admin') {
                // Завантажуємо список кур'єрів для випадаючого меню
                const { data: couriers } = await supabase.from('staff').select('*').eq('business_id', bizId).eq('role', 'courier');
                availableCouriers = couriers || [];
                const select = document.getElementById('courier-select');
                availableCouriers.forEach(c => {
                    select.innerHTML += `<option value="${c.user_id || c.tg_id}">${c.name}</option>`;
                });
            }

            initMap();
        } catch (e) {
            document.getElementById('load-text').innerText = "Помилка: " + e.message;
        }
    }

    function initMap() {
        mapboxgl.accessToken = MAPBOX_TOKEN;
        map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/streets-v12',
            center: [bizData.lng || 21.999, bizData.lat || 50.041],
            zoom: 12
        });

        const bizEl = document.createElement('div');
        bizEl.innerHTML = '<div style="color: #0f172a; font-size: 28px;"><i class="fa-solid fa-store"></i></div>';
        new mapboxgl.Marker(bizEl).setLngLat([bizData.lng || 21.999, bizData.lat || 50.041]).addTo(map);

        map.on('click', () => closePanel());
        map.on('load', () => {
            document.getElementById('loading-screen').style.display = 'none';
            loadOrders();
            setInterval(loadOrders, 15000); // Оновлюємо кожні 15 сек
            
            // Запускаємо локальний таймер кожну хвилину для оновлення цифр
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateAllTimers, 60000);
        });
    }

    // 🔴 РОЗРАХУНОК ТАЙМЕРА
    function calculateTimeDiff(createdAtStr, estTimeMins) {
        const createdDate = new Date(createdAtStr + 'Z'); // UTC
        const deadline = new Date(createdDate.getTime() + (estTimeMins * 60000));
        const now = new Date();
        // Рахуємо різницю в хвилинах
        const diffMins = Math.ceil((deadline - now) / 60000);
        return diffMins;
    }

    function closePanel() {
        document.getElementById('bottom-sheet').classList.remove('active');
        selectedOrder = null;
    }

    async function loadOrders() {
        try {
            const { data: orders } = await supabase.from('orders')
                .select('*')
                .eq('business_id', bizId)
                .eq('status', 'pending');

            activeOrdersData = orders || [];
            drawMarkers();
        } catch (e) { console.error(e); }
    }

    function drawMarkers() {
        markers.forEach(m => m.remove());
        markers = [];

        activeOrdersData.forEach(order => {
            if (!order.lat || !order.lon) return;

            const isUnassigned = !order.courier_id || order.courier_id === 'unassigned';
            const isMine = String(order.courier_id) === String(userId);
            
            // Якщо Кур'єр, і замовлення чуже або вільне — НЕ МАЛЮЄМО (щоб не засмічувати)
            if (userRole === 'courier' && !isMine) return;

            const diffMins = calculateTimeDiff(order.created_at, order.est_time || 30);
            
            let timeText = diffMins;
            let badgeClass = diffMins < 0 ? 'time-badge time-late' : 'time-badge time-ok';
            if (diffMins < 0) timeText = `${diffMins} 🔥`; // Мінус підставиться автоматично

            const el = document.createElement('div');
            el.className = 'custom-marker';

            let pinClass = 'pin-free';
            let iconHtml = '<i class="fa-solid fa-location-dot"></i>';
            let labelOpacity = '1';

            if (userRole === 'admin') {
                if (isUnassigned) {
                    pinClass = 'pin-free'; // Синій пульсуючий
                } else {
                    pinClass = 'pin-others'; // Сірий статичний
                    labelOpacity = '0.7';
                }
            } else if (userRole === 'courier') {
                pinClass = 'pin-mine'; // Жовтий
            }

            const shortAddr = order.address.split(',')[0];

            el.innerHTML = `
                <div class="marker-label" style="opacity: ${labelOpacity}">
                    <span>${shortAddr}</span>
                    <span class="${badgeClass}" data-created="${order.created_at}" data-est="${order.est_time || 30}">${timeText}</span>
                </div>
                <div class="${pinClass}">${iconHtml}</div>
            `;

            el.onclick = (e) => {
                e.stopPropagation();
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                
                selectedOrder = order;
                document.getElementById('panel-address').innerText = shortAddr;
                
                const pTime = document.getElementById('panel-time');
                pTime.className = badgeClass;
                pTime.innerText = `${timeText} хв`;

                // Оплата
                let payStr = "Онлайн"; let payIcon = "fa-globe";
                if (order.pay_type === 'cash') { payStr = `Готівка: ${order.amount}`; payIcon = "fa-money-bill-wave"; }
                if (order.pay_type === 'terminal') { payStr = `Термінал: ${order.amount}`; payIcon = "fa-credit-card"; }
                document.getElementById('panel-pay').innerText = payStr;
                document.getElementById('panel-pay-icon').className = `fa-solid ${payIcon}`;

                // Логіка панелі
                if (userRole === 'admin') {
                    document.getElementById('courier-actions').style.display = 'none';
                    if (isUnassigned) {
                        document.getElementById('admin-actions').style.display = 'block';
                        document.getElementById('panel-courier-row').style.display = 'none';
                        // Скидаємо селект
                        document.getElementById('courier-select').value = "";
                    } else {
                        document.getElementById('admin-actions').style.display = 'none';
                        document.getElementById('panel-courier-row').style.display = 'flex';
                        
                        // Шукаємо ім'я кур'єра
                        let cName = "Невідомий";
                        let cObj = availableCouriers.find(c => String(c.user_id) === String(order.courier_id));
                        if(cObj) cName = cObj.name;
                        document.getElementById('panel-courier').innerHTML = `Кур'єр: <b>${cName}</b>`;
                    }
                } else if (userRole === 'courier') {
                    document.getElementById('admin-actions').style.display = 'none';
                    document.getElementById('panel-courier-row').style.display = 'none';
                    document.getElementById('courier-actions').style.display = 'block';
                }

                document.getElementById('bottom-sheet').classList.add('active');
                map.flyTo({ center: [order.lon, order.lat], zoom: 14, speed: 1.2 });
            };

            const marker = new mapboxgl.Marker(el).setLngLat([order.lon, order.lat]).addTo(map);
            markers.push(marker);
        });
    }

    // Оновлення таймерів без перезапиту до бази
    function updateAllTimers() {
        document.querySelectorAll('.time-badge').forEach(badge => {
            const createdAt = badge.getAttribute('data-created');
            const estTime = parseInt(badge.getAttribute('data-est'));
            if(createdAt && estTime) {
                const diffMins = calculateTimeDiff(createdAt, estTime);
                if(diffMins < 0) {
                    badge.className = 'time-badge time-late';
                    badge.innerText = `${diffMins} 🔥`;
                } else {
                    badge.className = 'time-badge time-ok';
                    badge.innerText = diffMins;
                }
            }
        });
    }
</script>
</body>
</html>
