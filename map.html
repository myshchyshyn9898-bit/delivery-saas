    <style>
        :root {
            --primary: #ff7652;
            --info: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
            --bg: #f4f4f8;
            --history: #8b5cf6;
        }

        body {
            margin: 0; padding: 0;
            font-family: sans-serif;
            background: var(--bg);
            overflow: hidden;
        }

        /* ── ЕКРАН ЗАВАНТАЖЕННЯ ── */
        #loading-screen {
            position: absolute; inset: 0;
            background: white; z-index: 9999;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: #333; text-align: center; padding: 20px;
        }
        .spinner { font-size: 40px; color: var(--primary); margin-bottom: 15px; }

        /* ── КАРТА ── */
        #map { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }

        /* ── МАРКЕРИ ── */
        .custom-marker {
            display: flex; flex-direction: column; align-items: center; cursor: pointer;
        }
        .custom-marker:active { opacity: 0.8; }

        .marker-label {
            background: white; padding: 4px 8px;
            border-radius: 8px; border: 1px solid #ddd;
            font-size: 13px; font-weight: bold; color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 4px; white-space: nowrap;
        }

        /* Маркери активних замовлень */
        .time-badge {
            background: #fff0ed; color: var(--primary);
            padding: 2px 6px; border-radius: 6px;
            font-size: 11px; display: flex; align-items: center;
            gap: 4px; font-weight: bold;
        }
        .time-badge.late {
            background: #fee2e2; color: var(--danger);
            animation: pulseRed 2s infinite;
        }
        @keyframes pulseRed {
            0%   { box-shadow: 0 0 0 0   rgba(239, 68, 68, 0.5); }
            70%  { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);   }
            100% { box-shadow: 0 0 0 0   rgba(239, 68, 68, 0);   }
        }

        .pin-icon { font-size: 28px; filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.3)); line-height: 1; }
        .pin-free   { color: var(--info);   animation: pulseFree 2s ease-in-out infinite; }
        .pin-mine   { color: #f59e0b; }
        .pin-others { color: #94a3b8; font-size: 24px; opacity: 0.8; }

        @keyframes pulseFree {
            0%, 100% { filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.3)); }
            50%       { filter: drop-shadow(0px 3px 8px rgba(59,130,246,0.75)); }
        }

        /* ── МАРКЕРИ ІСТОРІЇ ── */
        .history-badge {
            background: #ede9fe; color: var(--history);
            padding: 2px 6px; border-radius: 6px;
            font-size: 11px; display: flex; align-items: center;
            gap: 4px; font-weight: bold;
        }
        .pin-history { color: var(--history); font-size: 24px; opacity: 0.85; }

        /* ── ВЕРХНЯ ПАНЕЛЬ ── */
        #top-bar {
            position: absolute; top: 12px; left: 12px; right: 12px;
            display: flex; align-items: center; gap: 8px;
            z-index: 5;
        }

        #role-badge {
            background: rgba(255,255,255,0.95);
            padding: 8px 12px; border-radius: 10px;
            font-size: 12px; font-weight: bold; color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ddd;
            flex: 1;
        }

        /* Кнопка аналітики — тільки для admin */
        #btn-history {
            display: none;
            background: rgba(255,255,255,0.95);
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 12px; font-weight: bold;
            color: var(--history);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            white-space: nowrap;
            gap: 5px;
            align-items: center;
        }
        #btn-history.visible { display: flex; }
        #btn-history.history-active {
            background: var(--history);
            color: white;
            border-color: var(--history);
        }

        /* ── ПАНЕЛЬ ВИБОРУ ДАТИ (РЕЖИМ АНАЛІТИКИ) ── */
        #history-bar {
            position: absolute; top: 60px; left: 12px; right: 12px;
            display: none;
            background: rgba(255,255,255,0.97);
            border-radius: 12px;
            padding: 10px 14px;
            box-shadow: 0 4px 16px rgba(139,92,246,0.15);
            border: 1px solid #ede9fe;
            z-index: 5;
            align-items: center;
            gap: 8px;
        }
        #history-bar.visible { display: flex; }

        #history-bar label {
            font-size: 12px; font-weight: bold; color: var(--history);
            white-space: nowrap;
        }
        #history-date {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            outline: none;
            background: #faf8ff;
        }
        #btn-load-history {
            background: var(--history);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        #btn-load-history:active { background: #7c3aed; }

        #history-stats {
            position: absolute; top: 116px; left: 12px; right: 12px;
            display: none;
            background: rgba(255,255,255,0.97);
            border-radius: 10px;
            padding: 8px 14px;
            box-shadow: 0 4px 12px rgba(139,92,246,0.1);
            border: 1px solid #ede9fe;
            z-index: 5;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }
        #history-stats.visible { display: flex; }
        .stat-chip {
            display: flex; align-items: center; gap: 5px;
            font-size: 12px; font-weight: bold; color: #555;
        }
        .stat-chip i { color: var(--history); font-size: 13px; }

        /* ── BOTTOM SHEET ── */
        .bottom-sheet {
            position: absolute; bottom: -120%; left: 0; right: 0;
            background: white; border-radius: 20px 20px 0 0; padding: 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
            transition: bottom 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 10; display: flex; flex-direction: column; gap: 12px;
        }
        .bottom-sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #cbd5e1; border-radius: 5px; margin: 0 auto 10px; }
        .sheet-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .sheet-title  { margin: 0; font-size: 18px; color: #222; font-weight: bold; }

        .sheet-info-row {
            display: flex; align-items: center; gap: 10px;
            font-size: 15px; color: #555;
            background: #f8fafc; padding: 10px;
            border-radius: 10px; border: 1px solid #eee;
        }
        .sheet-info-row i { color: var(--primary); width: 20px; text-align: center; font-size: 16px; }
        .sheet-info-row.history-row i { color: var(--history); }

        .btn-take {
            background: var(--primary); color: white; border: none;
            padding: 14px; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 5px;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            width: 100%; box-sizing: border-box;
        }
        .btn-take:active { background: #e86343; }

        .btn-cancel {
            background: transparent; color: #888; border: none;
            padding: 10px; font-size: 14px; cursor: pointer;
            width: 100%; font-weight: bold;
        }

        .select-courier {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid #ddd; font-size: 15px; font-weight: bold;
            background: #f8fafc; color: #333; outline: none;
            margin-top: 5px; box-sizing: border-box;
        }

        /* Бейдж "Виконано" в шапці панелі */
        .badge-done {
            background: #dcfce7; color: #16a34a;
            padding: 3px 10px; border-radius: 20px;
            font-size: 12px; font-weight: bold;
            display: flex; align-items: center; gap: 4px;
        }
    </style>
</head>
<body>

<div id="loading-screen">
    <i id="load-icon" class="fa-solid fa-circle-notch fa-spin spinner"></i>

    <div id="error-text" style="color:red;font-size:13px;margin-top:10px;font-weight:bold;white-space:pre-wrap;"></div>
</div>

<div id="top-bar">

</div>

<!-- Панель вибору дати (з'являється в режимі аналітики) -->
<div id="history-bar">
    <label><i class="fa-solid fa-calendar-days"></i> <span id="map-date-lbl">Дата:</span></label>
    <input type="date" id="history-date" />
    <button id="btn-load-history"><i class="fa-solid fa-magnifying-glass"></i> <span id="map-loadhist-txt">Показати</span></button>
</div>

<!-- Міні-статистика по дню -->
<div id="history-stats">
    <div class="stat-chip"><i class="fa-solid fa-box-archive"></i><span id="stat-count"><span id="map-orders-count">0 замовлень</span></span></div>
    <div class="stat-chip"><i class="fa-solid fa-coins"></i><span id="stat-revenue">0 zł</span></div>
    <div class="stat-chip"><i class="fa-solid fa-clock-rotate-left"></i><span id="stat-avg">~0 хв</span></div>
</div>

<div id="map"></div>

<!-- Bottom sheet — спільний для активних і закритих замовлень -->
<div id="bottom-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <h3 id="panel-address" class="sheet-title"><span id="map-addr-txt">Адреса</span></h3>
        <div id="panel-badge" class="time-badge">🕒 0 хв</div>
    </div>

    <!-- Рядки для активних замовлень -->
    <div id="active-rows">
        <div class="sheet-info-row" id="panel-courier-row" style="display:none;">
            <i class="fa-solid fa-motorcycle"></i><span id="panel-courier"><span id="map-courier-txt">Кур'єр: -</span></span>
        </div>
        <div class="sheet-info-row">
            <i id="panel-pay-icon" class="fa-solid fa-wallet"></i><strong id="panel-pay"><span id="map-pay-txt">Оплата</span></strong>
        </div>

        <div id="admin-actions" style="display:none;">
            <select id="courier-select" class="select-courier"></select>
            <button id="btn-assign" class="btn-take" style="background:var(--info);">
                <i class="fa-solid fa-paper-plane"></i> <span id="map-assign-txt">Призначити</span>
            </button>
        </div>

        <div id="courier-actions" style="display:none;">
            <button id="btn-route" class="btn-take">
                <i class="fa-solid fa-map-location-dot"></i> <span id="map-route-txt">Побудувати маршрут</span>
            </button>
        </div>

        <!-- Кур'єр: взяти вільне замовлення (uber режим) -->
        <div id="uber-take-actions" style="display:none;">
            <button id="btn-take-order" class="btn-take">
                🚀 <span id="map-take-txt">Взяти замовлення</span>
            </button>
        </div>

        <!-- Кур'єр: я вже везу (uber режим — моє замовлення) -->
        <div id="uber-mine-actions" style="display:none;">
            <button id="btn-uber-route" class="btn-take">
                <i class="fa-solid fa-map-location-dot"></i> <span id="map-route-txt2">Побудувати маршрут</span>
            </button>
        </div>

        <!-- Деталі (квартира, коментар) -->
        <div class="sheet-info-row" id="panel-details-row" style="display:none;">
            <i class="fa-solid fa-building"></i><span id="panel-details">-</span>
        </div>
        <div class="sheet-info-row" id="panel-comment-row" style="display:none;">
            <i class="fa-solid fa-comment"></i><span id="panel-comment">-</span>
        </div>
    </div>

    <!-- Рядки для закритих замовлень (аналітика) -->
    <div id="history-rows" style="display:none;">
        <div class="sheet-info-row history-row">
            <i class="fa-solid fa-motorcycle"></i><span id="hist-courier"><span id="map-hcourier-txt">Кур'єр: -</span></span>
        </div>
        <div class="sheet-info-row history-row">
            <i id="hist-pay-icon" class="fa-solid fa-wallet"></i><strong id="hist-pay"><span id="map-hpay-txt">Оплата</span></strong>
        </div>
        <div class="sheet-info-row history-row">
            <i class="fa-solid fa-stopwatch"></i><span id="hist-time"><span id="map-time-txt">Час доставки: -</span></span>
        </div>
        <div class="sheet-info-row history-row" id="hist-comment-row" style="display:none;">
            <i class="fa-solid fa-comment"></i><span id="hist-comment">-</span>
        </div>
    </div>

    <button id="btn-cancel" class="btn-cancel"><span id="map-hide-txt">Сховати</span></button>
</div>

/* ── УТИЛІТИ ── */
    function logError(text) {
        var el = document.getElementById('error-text');
        if (el) el.innerText += '🚨 ' + text + '\n';
        console.error(text);
    }
    function showError(msg) {

        document.getElementById('load-icon').className = 'fa-solid fa-circle-exclamation spinner';
    }

    /* ── КОНФІГ ── */
    var MAPBOX_TOKEN   = ''; // ✅ завантажується з /config
            // SERVER_URL: автоматично визначається або береться з мета-тегу
        var RAILWAY_DOMAIN = (function() {
            const meta = document.querySelector('meta[name="server-url"]');
            if (meta && meta.content) return meta.content.replace(/\/$/, '');
            return "https://delivery-saas-production-3fe6.up.railway.app";
        })();

    var _supabaseCfgCache = null;
    async function getSupabaseCfg() {
        if (!_supabaseCfgCache) {
            var res;
            const _ctrl = new AbortController(); const _tid = setTimeout(() => _ctrl.abort(), 8000);
            try { res = await fetch(RAILWAY_DOMAIN + '/config', { signal: _ctrl }); clearTimeout(_tid); }
            catch (e) { clearTimeout(_tid); throw new Error(e.name === 'AbortError' ? '⏳ Сервер не відповідає. Оновіть сторінку.' : ML.server_down + RAILWAY_DOMAIN + '): ' + e.message); }

            if (!res.ok) throw new Error(ML.err_config_http + res.status + ' ' + res.statusText);

            var cfg;
            try { cfg = await res.json(); }
            catch (e) { throw new Error(ML.err_config + e.message); }

            if (!cfg.supabase_url || !cfg.supabase_key)
                throw new Error(ML.err_config);

            _supabaseCfgCache = cfg;
            if (cfg && cfg.mapbox_token) { MAPBOX_TOKEN = cfg.mapbox_token; mapboxgl.accessToken = MAPBOX_TOKEN; }
        }
        return _supabaseCfgCache;
    }

    var map, markers = [], historyMarkers = [], selectedOrder = null;

    /* ── СТАРТ ── */
    document.addEventListener('DOMContentLoaded', async function() {
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready(); tg.expand();
                if (tg.setHeaderColor) tg.setHeaderColor('#ffffff');
                applyMapTranslations();
            }

            userId = tgId || (tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null);

            if (!bizId || !authToken) { showError('Помилка: Немає токена доступу'); return; }
            if (!window.supabase) {
                showError(ML.err_supabase);
                logError('window.supabase відсутній — перевірте CDN');
                return;
            }

            document.getElementById('load-text').innerText = ML.connecting;
            var cfg;
            try { cfg = await getSupabaseCfg(); }
            catch (cfgErr) { showError(ML.err_server); logError(cfgErr.message); return; }

            supabase = window.supabase.createClient(cfg.supabase_url, cfg.supabase_key, {
                global: { headers: { Authorization: 'Bearer ' + authToken } }
            });

            /* Встановлюємо дату за замовчуванням — вчора */
            var yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            document.getElementById('history-date').value = yesterday.toISOString().split('T')[0];

            document.getElementById('btn-cancel').onclick = closePanel;

            document.getElementById('btn-route').onclick = function() {
                if (!selectedOrder) return;
                tg.openLink('https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(selectedOrder.address));
            };

            /* Uber: маршрут для свого замовлення */
            document.getElementById('btn-uber-route').onclick = function() {
                if (!selectedOrder) return;
                tg.openLink('https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(selectedOrder.address));
            };

            /* Uber: взяти замовлення з карти */
            document.getElementById('btn-take-order').onclick = async function() {
                if (!selectedOrder) return;
                var btn = document.getElementById('btn-take-order');
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ' + ML.processing_lbl + '';

                try {
                    // 1. Перевіряємо актуальний статус
                    var checkRes = await supabase.from('orders').select('status, courier_id').eq('id', selectedOrder.id).single();
                    if (checkRes.data && checkRes.data.status !== 'pending') {
                        tg.showAlert(ML.taken_fast);
                        closePanel(); loadOrders();
                        return;
                    }

                    // 2. Атомарно захоплюємо в Supabase
                    var result = await supabase.from('orders')
                        .update({ status: 'delivering', courier_id: userId })
                        .eq('id', selectedOrder.id)
                        .eq('status', 'pending');

                    if (result.error) throw result.error;

                    // 3. Перевіряємо що саме ми захопили
                    var verify = await supabase.from('orders').select('courier_id, status').eq('id', selectedOrder.id).single();
                    if (!verify.data || String(verify.data.courier_id) !== String(userId)) {
                        tg.showAlert(ML.taken_fast);
                        closePanel(); loadOrders();
                        return;
                    }

                    // 4. Повідомляємо бота через API (НЕ sendData — WebApp залишається відкритим!)
                    //    Бот оновить групове повідомлення і надішле кур'єру особисте з кнопками
                    try {
                        const serverUrl = document.querySelector('meta[name="server-url"]')?.content || '';
                        await fetch(serverUrl + '/api/take_order', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + authToken
                            },
                            body: JSON.stringify({
                                order_id: selectedOrder.id,
                                courier_id: userId,
                                courier_name: tg.initDataUnsafe?.user?.username
                                    ? '@' + tg.initDataUnsafe.user.username
                                    : (tg.initDataUnsafe?.user?.first_name || 'Кур\'єр'),
                                lang: currentLang || 'en'
                            })
                        });
                    } catch(apiErr) {
                        console.warn('[take_order] API call failed:', apiErr);
                        // ✅ FIX: замовлення взято локально але бот не отримав нотифікацію
                        alert('✅ Замовлення взято! Але не вдалось отримати кнопки закриття. Використай команду "📦 Мої замовлення" в боті.');
                        // Не критично — замовлення вже захоплено в Supabase
                    }

                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

                    // 5. Карта залишається відкритою — просто оновлюємо маркери
                    closePanel();
                    loadOrders();

                } catch(e) {
                    tg.showAlert(ML.err_prefix + e.message);
                    btn.disabled = false;
                    btn.innerHTML = ML.btn_take;
                }
            };

            document.getElementById('btn-assign').onclick = async function() {
                var cId = document.getElementById('courier-select').value;
                if (!cId || !selectedOrder) return tg.showAlert(ML.select_courier);
                var btn = document.getElementById('btn-assign');
                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ' + ML.processing_lbl;
                try {
                    var result = await supabase.from('orders')
                        .update({ courier_id: cId, status: 'delivering' })
                        .eq('id', selectedOrder.id);
                    if (result.error) throw result.error;
                    tg.sendData(JSON.stringify({ action: 'assign_order', order_id: selectedOrder.id, courier_id: cId }));
                    tg.showAlert(ML.assigned_ok);
                    closePanel(); loadOrders();
                } catch (e) {
                    tg.showAlert(ML.err_prefix + e.message);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> ' + ML.btn_assign + '';
                }
            };

            /* Кнопка аналітики */
            document.getElementById('btn-history').onclick = toggleHistoryMode;
            document.getElementById('btn-load-history').onclick = function() {
                var date = document.getElementById('history-date').value;
                if (!date) return tg.showAlert(ML.select_date);
                loadHistoryOrders(date);
            };

            setTimeout(initMapAndData, 100);

        } catch (err) {
            showError(ML.err_start);
            logError(ML.err_start_prefix + (err.message || String(err)));
        }
    });

    /* ── ІНІЦІАЛІЗАЦІЯ ── */
    async function initMapAndData() {
        try {
            var bizRes = await supabase.from('businesses').select('*').eq('id', bizId).single();
            if (bizRes.error) throw new Error(ML.err_biz + bizRes.error.message);
            bizData = bizRes.data;

            if (bizData && String(bizData.owner_id) === String(userId)) {
                userRole = 'admin';
                document.getElementById('role-badge').innerHTML = '👑 <b>' + ML.role_owner.replace('👑 ','') + '</b>';
            } else {
                var staffRes = await supabase.from('staff').select('*').eq('user_id', userId).eq('business_id', bizId).single();
                var staff = staffRes.data;
                if (staff && staff.role === 'manager') {
                    userRole = 'admin';
                    document.getElementById('role-badge').innerHTML = '👨‍💼 <b>' + ML.role_manager.replace('👨‍💼 ','') + '</b>';
                } else if (staff && staff.role === 'courier') {
                    userRole = 'courier';
                    document.getElementById('role-badge').innerHTML = '🛵 <b>' + ML.role_owner.replace('👑 ', '') + '</b> ' + staff.name;
                } else {
                    document.getElementById('role-badge').innerHTML = ML.guest;
                }
            }

            /* Режим доставки з бізнесу */
            deliveryMode = bizData.delivery_mode || 'dispatcher';

            /* Кнопка аналітики — тільки для адміна/власника */
            if (userRole === 'admin') {
                document.getElementById('btn-history').classList.add('visible');
            }

            if (userRole === 'admin') {
                var couriersRes = await supabase.from('staff').select('*').eq('business_id', bizId).eq('role', 'courier');
                availableCouriers = couriersRes.data || [];
                var sel = document.getElementById('courier-select');
                sel.innerHTML = '<option value="" disabled selected>' + ML.select_courier + '</option>';
                availableCouriers.forEach(function(c) {
                    var opt = document.createElement('option');
                    opt.value = c.user_id || c.tg_id;
                    opt.textContent = c.name;
                    sel.appendChild(opt);
                });
            }

            if (!window.mapboxgl) { showError(ML.err_mapbox); return; }
            // mapboxgl.accessToken встановлюється після завантаження /config
            if (!mapboxgl.supported()) { showError(ML.err_mapbox); return; }

            var bLng = parseFloat(bizData.lng) || 21.99901;
            var bLat = parseFloat(bizData.lat) || 50.04132;

            map = new mapboxgl.Map({ container: 'map', style: 'mapbox://styles/mapbox/streets-v12', center: [bLng, bLat], zoom: 13 });

            var bizEl = document.createElement('div');
            bizEl.innerHTML = '<div style="color:#ff7652;font-size:28px;filter:drop-shadow(0 3px 4px rgba(0,0,0,0.25));"><i class="fa-solid fa-store"></i></div>';
            new mapboxgl.Marker(bizEl).setLngLat([bLng, bLat]).addTo(map);

            map.on('click', closePanel);
            map.on('load', function() {
                document.getElementById('loading-screen').style.display = 'none';
                loadOrders();
                setInterval(loadOrders, 15000);
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(updateAllTimers, 60000);
            });

        } catch (e) { showError(ML.err_init); logError(e.message || String(e)); }
    }

    /* ── АКТИВНІ ЗАМОВЛЕННЯ ── */
    async function loadOrders() {
        /* Не перезавантажуємо активні маркери поки в режимі аналітики */
        if (isHistoryMode) return;
        try {
            /* Завантажуємо і pending і delivering — обидва "активні" статуси */
            var res = await supabase.from('orders').select('*')
                .eq('business_id', bizId)
                .in('status', ['pending', 'delivering']);
            if (res.error) throw res.error;
            activeOrdersData = res.data || [];

            /* Для uber-режиму завантажуємо імена кур'єрів щоб показати на маркері */
            if (deliveryMode === 'uber' && activeOrdersData.length > 0) {
                var courierIds = [...new Set(
                    activeOrdersData
                        .filter(function(o) { return o.courier_id && o.courier_id !== 'unassigned'; })
                        .map(function(o) { return String(o.courier_id); })
                )];
                if (courierIds.length > 0 && availableCouriers.length === 0) {
                    /* Якщо ще не завантажили кур'єрів — завантажуємо зараз */
                    var staffRes = await supabase.from('staff').select('user_id, name').eq('business_id', bizId);
                    if (staffRes.data) availableCouriers = staffRes.data;
                }
            }

            drawMarkers();
        } catch (e) { console.error(ML.loading_orders, e); }
    }

    /* ── ТАЙМЕР (захист від таймзон + Safari) ── */
    function calculateTimeDiff(createdAtStr, estTimeMins) {
        var cleanStr  = createdAtStr.split('.')[0].split('+')[0].replace(' ', 'T');
        var now       = new Date();
        var diffUTC   = Math.floor((now - new Date(cleanStr + 'Z')) / 60000);
        var diffLocal = Math.floor((now - new Date(cleanStr.replace(/-/g, '/').replace('T', ' '))) / 60000);
        var elapsed;
        if      (diffUTC >= 0 && diffLocal >= 0) elapsed = Math.min(diffUTC, diffLocal);
        else if (diffUTC   >= 0)                 elapsed = diffUTC;
        else if (diffLocal >= 0)                 elapsed = diffLocal;
        else                                     elapsed = 0;
        return (estTimeMins || 30) - elapsed;
    }

    /* ── МАРКЕРИ АКТИВНИХ ── */
    function drawMarkers() {
        markers.forEach(function(m) { m.remove(); });
        markers = [];

        activeOrdersData.forEach(function(order) {
            if (!order.lat || !order.lon) return;

            var isUnassigned = !order.courier_id || order.courier_id === 'unassigned';
            var isMine       = String(order.courier_id) === String(userId);
            var isDelivering = order.status === 'delivering';

            // Uber: кур'єр бачить вільні + своє delivering; чужі delivering — теж показуємо але сірим
            // Dispatcher: кур'єр бачить тільки своє + unassigned
            if (userRole === 'courier') {
                if (deliveryMode === 'uber') {
                    // показуємо все: вільні + своє + чужі delivering (сірим)
                } else {
                    if (!isMine && !isUnassigned) return;
                }
            }

            var diffMins     = calculateTimeDiff(order.created_at, order.est_time || 30);
            var isLate       = diffMins < 0;
            var pinClass     = 'pin-free';
            var labelOpacity = '1';

            /* Знаходимо ім'я кур'єра для delivering замовлень */
            var courierDisplayName = '';
            if (isDelivering && order.courier_id) {
                var foundCourier = availableCouriers.find(function(c) {
                    return String(c.user_id || c.tg_id) === String(order.courier_id);
                });
                courierDisplayName = foundCourier ? foundCourier.name : ('ID:' + String(order.courier_id).slice(-4));
            }

            if (userRole === 'admin') {
                if (isDelivering) { pinClass = 'pin-others'; labelOpacity = '0.75'; }
                else if (!isUnassigned) { pinClass = 'pin-others'; labelOpacity = '0.7'; }
            } else {
                if (isMine) {
                    pinClass = 'pin-mine';
                } else if (isDelivering) {
                    /* Чужі delivering — сірий (тільки uber бачить їх) */
                    pinClass = 'pin-others';
                    labelOpacity = '0.6';
                }
            }

            var shortAddr  = order.address.split(',')[0];
            var badgeClass = isLate ? 'time-badge late' : 'time-badge';
            var timeText   = isLate ? (diffMins + ' 🔥') : ('🕒 ' + diffMins + ' хв');

            /* Для delivering замовлень — показуємо ім'я кур'єра замість таймера */
            var badgeHtml;
            if (isDelivering && courierDisplayName) {
                badgeHtml = '<span class="time-badge" style="background:rgba(100,116,139,0.12);color:#64748b;">🛵 ' + courierDisplayName + '</span>';
            } else {
                badgeHtml = '<span class="' + badgeClass + '" data-created="' + order.created_at + '" data-est="' + (order.est_time || 30) + '">' + timeText + '</span>';
            }

            var el = document.createElement('div');
            el.className = 'custom-marker';
            el.innerHTML =
                '<div class="marker-label" style="opacity:' + labelOpacity + '">' +
                    '<span>' + shortAddr + '</span>' +
                    badgeHtml +
                '</div>' +
                '<div class="pin-icon ' + pinClass + '"><i class="fa-solid fa-location-dot"></i></div>';

            el.onclick = (function(capturedOrder, capturedShortAddr, capturedBadgeClass, capturedTimeText, capturedIsUnassigned, capturedIsDelivering, capturedCourierName) {
                return function(e) {
                    e.stopPropagation();
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                    openActivePanel(capturedOrder, capturedShortAddr, capturedBadgeClass, capturedTimeText, capturedIsUnassigned, capturedIsDelivering, capturedCourierName);
                    map.flyTo({ center: [capturedOrder.lon, capturedOrder.lat], zoom: 15, speed: 1.2 });
                };
            })(order, shortAddr, badgeClass, timeText, isUnassigned, isDelivering, courierDisplayName);

            markers.push(new mapboxgl.Marker(el).setLngLat([order.lon, order.lat]).addTo(map));
        });
    }

    /* ── ПАНЕЛЬ АКТИВНОГО ЗАМОВЛЕННЯ ── */
    function openActivePanel(order, shortAddr, badgeClass, timeText, isUnassigned, isDelivering, courierDisplayName) {
        selectedOrder = order;

        document.getElementById('panel-address').innerText = shortAddr;
        var pBadge = document.getElementById('panel-badge');
        if (isDelivering && courierDisplayName) {
            pBadge.className = 'time-badge';
            pBadge.style.background = 'rgba(100,116,139,0.12)';
            pBadge.style.color = '#64748b';
            pBadge.innerText = '🛵 ' + courierDisplayName;
        } else {
            pBadge.className = badgeClass;
            pBadge.style.background = '';
            pBadge.style.color = '';
            pBadge.innerText = timeText;
        }

        var payStr = ML.online_lbl, payIcon = 'fa-globe';
        if (order.pay_type === 'cash')     { payStr = ML.cash_lbl  + order.amount + ' zł'; payIcon = 'fa-money-bill-wave'; }
        if (order.pay_type === 'terminal') { payStr = ML.term_lbl + order.amount + ' zł'; payIcon = 'fa-credit-card'; }
        document.getElementById('panel-pay').innerText = payStr;
        document.getElementById('panel-pay-icon').className = 'fa-solid ' + payIcon;

        /* Показуємо активні рядки, ховаємо рядки аналітики */
        document.getElementById('active-rows').style.display = '';
        document.getElementById('history-rows').style.display = 'none';

        // Ховаємо всі блоки дій
        ['admin-actions','courier-actions','uber-take-actions','uber-mine-actions','panel-courier-row'].forEach(function(id) {
            document.getElementById(id).style.display = 'none';
        });

        // Деталі та коментар
        if (order.details || order.apt) {
            document.getElementById('panel-details').innerText = order.details || order.apt || '-';
            document.getElementById('panel-details-row').style.display = 'flex';
        } else {
            document.getElementById('panel-details-row').style.display = 'none';
        }
        if (order.comment) {
            document.getElementById('panel-comment').innerText = order.comment;
            document.getElementById('panel-comment-row').style.display = 'flex';
        } else {
            document.getElementById('panel-comment-row').style.display = 'none';
        }

        if (userRole === 'admin') {
            // Адмін: показуємо кур'єра якщо призначено, або форму призначення
            if (isUnassigned) {
                document.getElementById('admin-actions').style.display = 'block';
            } else {
                document.getElementById('panel-courier-row').style.display = 'flex';
                var c = availableCouriers.find(function(x) { return String(x.user_id) === String(order.courier_id); });
                var cName = courierDisplayName || (c ? c.name : 'Кур\'єр');
                document.getElementById('panel-courier').innerHTML = "Кур\'єр: <b>" + cName + '</b>';
            }
        } else {
            // COURIER
            if (deliveryMode === 'uber') {
                var isMineOrder = String(order.courier_id) === String(userId);
                if (isUnassigned) {
                    // Вільне замовлення — показуємо "Взяти"
                    document.getElementById('uber-take-actions').style.display = 'block';
                } else if (isMineOrder) {
                    // Моє замовлення — показуємо маршрут
                    document.getElementById('uber-mine-actions').style.display = 'block';
                }
                // Чужі delivering — показуємо хто везе (без кнопок)
                if (!isUnassigned && !isMineOrder && courierDisplayName) {
                    document.getElementById('panel-courier-row').style.display = 'flex';
                    document.getElementById('panel-courier').innerHTML = ML.delivering_lbl + "<b>" + courierDisplayName + '</b>';
                }
            } else {
                // DISPATCHER: кур'єр бачить тільки свої — маршрут
                document.getElementById('courier-actions').style.display = 'block';
            }
        }

        document.getElementById('bottom-sheet').classList.add('active');
    }

    /* ── ОНОВЛЕННЯ ТАЙМЕРІВ ── */
    function updateAllTimers() {
        document.querySelectorAll('.time-badge[data-created]').forEach(function(badge) {
            var created = badge.getAttribute('data-created');
            var est     = parseInt(badge.getAttribute('data-est'));
            if (!created || !est) return;
            var diff = calculateTimeDiff(created, est);
            badge.className = diff < 0 ? 'time-badge late' : 'time-badge';
            badge.innerText = diff < 0 ? (diff + ' 🔥') : ('🕒 ' + diff + ' хв');
        });
    }

    /* ═══════════════════════════════════════════════
       ── АНАЛІТИКА / ІСТОРІЯ МАРШРУТІВ ──
    ═══════════════════════════════════════════════ */

    function clearHistoryMarkers() {
        historyMarkers.forEach(function(m) { m.remove(); });
        historyMarkers = [];
    }

    async function loadHistoryOrders(dateStr) {
        var btn = document.getElementById('btn-load-history');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

        try {
            /* Беремо увесь день: від 00:00:00 до 23:59:59 по вибраній даті */
            var dayStart = dateStr + 'T00:00:00';
            var dayEnd   = dateStr + 'T23:59:59';

            var res = await supabase
                .from('orders')
                .select('*')
                .eq('business_id', bizId)
                .eq('status', 'completed')
                .gte('completed_at', dayStart)
                .lte('completed_at', dayEnd);

            if (res.error) throw res.error;

            clearHistoryMarkers();

            var orders = res.data || [];

            if (orders.length === 0) {
                tg.showAlert('За цю дату немає закритих замовлень.');
                document.getElementById('history-stats').classList.remove('visible');
                return;
            }

            /* Статистика */
            var totalRevenue = 0;
            var totalMins    = 0;
            var countMins    = 0;

            orders.forEach(function(order) {
                totalRevenue += parseFloat(order.amount) || 0;
                if (order.created_at && order.completed_at) {
                    var start = new Date(order.created_at.replace(' ', 'T'));
                    var end   = new Date(order.completed_at.replace(' ', 'T'));
                    var mins  = Math.round((end - start) / 60000);
                    if (mins > 0 && mins < 300) { totalMins += mins; countMins++; }
                }
            });

            var avgMins = countMins > 0 ? Math.round(totalMins / countMins) : 0;
            document.getElementById('stat-count').innerText   = orders.length + ' замовлень';
            document.getElementById('stat-revenue').innerText = totalRevenue.toFixed(0) + ' zł';
            document.getElementById('stat-avg').innerText     = '~' + avgMins + ' хв';
            document.getElementById('history-stats').classList.add('visible');

            /* Малюємо маркери */
            drawHistoryMarkers(orders);

            /* Автозум на всі точки */
            if (orders.length > 0) {
                var bounds = new mapboxgl.LngLatBounds();
                orders.forEach(function(o) {
                    if (o.lat && o.lon) bounds.extend([parseFloat(o.lon), parseFloat(o.lat)]);
                });
                if (!bounds.isEmpty()) {
                    map.fitBounds(bounds, { padding: 60, maxZoom: 15, speed: 1.2 });
                }
            }

        } catch (e) {
            tg.showAlert('Помилка завантаження: ' + e.message);
            console.error(e);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> ' + ML.show_lbl + '';
        }
    }

    function drawHistoryMarkers(orders) {
        orders.forEach(function(order) {
            if (!order.lat || !order.lon) return;

            var shortAddr = order.address.split(',')[0];

            /* Знаходимо ім'я кур'єра */
            var courierName = '—';
            if (order.courier_id) {
                var c = availableCouriers.find(function(x) {
                    return String(x.user_id) === String(order.courier_id) ||
                           String(x.tg_id)   === String(order.courier_id);
                });
                if (c) courierName = c.name;
            }

            var el = document.createElement('div');
            el.className = 'custom-marker';
            el.innerHTML =
                '<div class="marker-label">' +
                    '<span>' + shortAddr + '</span>' +
                    '<span class="history-badge"><i class="fa-solid fa-check"></i> ' + courierName + '</span>' +
                '</div>' +
                '<div class="pin-icon pin-history"><i class="fa-solid fa-location-dot"></i></div>';

            el.onclick = function(e) {
                e.stopPropagation();
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                openHistoryPanel(order, shortAddr, courierName);
                map.flyTo({ center: [parseFloat(order.lon), parseFloat(order.lat)], zoom: 15, speed: 1.2 });
            };

            historyMarkers.push(
                new mapboxgl.Marker(el)
                    .setLngLat([parseFloat(order.lon), parseFloat(order.lat)])
                    .addTo(map)
            );
        });
    }

    /* ── ПАНЕЛЬ ЗАКРИТОГО ЗАМОВЛЕННЯ ── */
    function openHistoryPanel(order, shortAddr, courierName) {
        selectedOrder = order;

        document.getElementById('panel-address').innerText = shortAddr;

        /* Бейдж "Виконано" замість таймера */
        var pBadge = document.getElementById('panel-badge');
        pBadge.className = 'badge-done';
        pBadge.innerHTML = '<i class="fa-solid fa-circle-check"></i> ' + ML.done_lbl + '';

        /* Кур'єр */
        document.getElementById('hist-courier').innerHTML = "Кур'єр: <b>" + courierName + '</b>';

        /* Оплата */
        var payStr = 'Онлайн (сплачено)', payIcon = 'fa-globe';
        if (order.pay_type === 'cash')     { payStr = ML.cash_lbl  + order.amount + ' zł'; payIcon = 'fa-money-bill-wave'; }
        if (order.pay_type === 'terminal') { payStr = ML.term_lbl + order.amount + ' zł'; payIcon = 'fa-credit-card'; }
        document.getElementById('hist-pay').innerText = payStr;
        document.getElementById('hist-pay-icon').className = 'fa-solid ' + payIcon;

        /* Час доставки */
        var timeStr = '—';
        if (order.created_at && order.completed_at) {
            var start = new Date(order.created_at.replace(' ', 'T'));
            var end   = new Date(order.completed_at.replace(' ', 'T'));
            var mins  = Math.round((end - start) / 60000);
            timeStr = mins > 0 ? mins + ' хв' : '< 1 хв';
        }
        document.getElementById('hist-time').innerText = ML.time_lbl.replace(': -','') + ': ' + timeStr;

        /* Коментар (якщо є) */
        if (order.comment) {
            document.getElementById('hist-comment').innerText = order.comment;
            document.getElementById('hist-comment-row').style.display = 'flex';
        } else {
            document.getElementById('hist-comment-row').style.display = 'none';
        }

        /* Показуємо рядки аналітики, ховаємо активні */
        document.getElementById('active-rows').style.display = 'none';
        document.getElementById('history-rows').style.display = '';

        document.getElementById('bottom-sheet').classList.add('active');
    }
</script>
