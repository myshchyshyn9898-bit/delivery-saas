<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта Замовлень | DeliPro</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    
    <style>
        :root { --primary: #ff6b4a; --info: #3b82f6; --success: #10b981; --danger: #ef4444; --surface: #ffffff; --bg: #f8fafc; }
        body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); overflow: hidden; }
        #loading-screen { position: absolute; inset: 0; background: var(--surface); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #0f172a; text-align: center; padding: 20px;}
        .spinner { font-size: 40px; color: var(--primary); margin-bottom: 15px; }
        #map { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; }
        .custom-marker { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .marker-label { background: var(--surface); padding: 4px 8px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px; font-weight: 800; color: #0f172a; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 6px; margin-bottom: 4px; white-space: nowrap; }
        .time-badge { padding: 2px 6px; border-radius: 6px; font-size: 12px; font-weight: 900; }
        .time-ok { background: #f1f5f9; color: #64748b; }
        .time-late { background: rgba(239, 68, 68, 0.15); color: var(--danger); animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .pin-free { color: var(--info); font-size: 32px; animation: bounce 2s infinite; }
        .pin-mine { color: #f59e0b; font-size: 32px; }
        .pin-others { color: #94a3b8; font-size: 24px; opacity: 0.8; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .bottom-sheet { position: absolute; bottom: -120%; left: 0; right: 0; background: var(--surface); border-radius: 24px 24px 0 0; padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); transition: bottom 0.4s; z-index: 10; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid #e2e8f0; }
        .bottom-sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #cbd5e1; border-radius: 5px; margin: 0 auto 10px; }
        .sheet-title { margin: 0; font-size: 18px; font-weight: 900; }
        .sheet-info-row { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: #475569; background: #f8fafc; padding: 12px; border-radius: 12px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-secondary { background: #f1f5f9; color: #475569; border: none; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .select-courier { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid var(--info); font-size: 15px; font-weight: 700; outline: none; }
        #role-badge { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.9); padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: 900; z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div id="loading-screen">
    <i class="fa-solid fa-circle-notch fa-spin spinner"></i>
    <div id="load-text" style="font-weight: 800; font-size: 15px;">Завантаження бібліотек...</div>
    <div id="error-text" style="color: red; font-size: 13px; margin-top: 10px; font-weight: 600; white-space: pre-wrap;"></div>
</div>

<div id="role-badge">Шукаю доступ...</div>
<div id="map"></div>

<div id="bottom-sheet" class="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <h3 id="panel-address" class="sheet-title">Адреса</h3>
        <div id="panel-time" class="time-badge time-ok">0 хв</div>
    </div>
    <div class="sheet-info-row" id="panel-courier-row" style="display: none;">
        <i class="fa-solid fa-motorcycle"></i><span id="panel-courier">Кур'єр: -</span>
    </div>
    <div class="sheet-info-row">
        <i id="panel-pay-icon" class="fa-solid fa-wallet"></i><strong id="panel-pay">Оплата</strong>
    </div>
    <div id="admin-actions" style="display: none;">
        <select id="courier-select" class="select-courier"></select>
        <button id="btn-assign" class="btn-main" style="background: var(--info);"><i class="fa-solid fa-paper-plane"></i> Призначити</button>
    </div>
    <div id="courier-actions" style="display: none;">
        <button id="btn-route" class="btn-secondary"><i class="fa-solid fa-map-location-dot"></i> Маршрут</button>
    </div>
    <button id="btn-cancel" class="btn-secondary" style="background: transparent; color: #94a3b8;">Сховати</button>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>

<script>
    var MAPBOX_TOKEN = "pk.eyJ1IjoibXlzaGNoeXNoeW45ODk4IiwiYSI6ImNtbmh3bnVzeTA2anIyd3NtNGR4YjQ3c2wifQ.vF1Do_h-OFFsyRsM5OQyMg";
    var SUPABASE_URL = "https://kvanzkcwpwmfexsmldvx.supabase.co";
    var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2YW56a2N3cHdtZmV4c21sZHZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzgyMzksImV4cCI6MjA4OTYxNDIzOX0.ZHXB9-PwJhH07LzPGpxK0HD-BkLGlf5w2L4WbgrX4JA";

    var map = null, markers = [], selectedOrder = null, tg = null, supabase = null;
    var userRole = "courier", userId = null, bizData = null, availableCouriers = [];
    var activeOrdersData = [], timerInterval = null;

    function logError(text) {
        var errDiv = document.getElementById("error-text");
        if (errDiv) errDiv.innerText += text + "\n";
        console.error(text);
    }

    async function startApp() {
        try {
            tg = window.Telegram.WebApp;
            tg.expand();
            
            var params = new URLSearchParams(window.location.search);
            var bizId = params.get("biz_id");
            var token = params.get("token");
            userId = params.get("tg_id") || (tg.initDataUnsafe?.user?.id);

            if (!bizId || !token) throw new Error("Відсутній токен або ID бізнесу");

            // Ініціалізація Supabase (зверни увагу на window.supabase.createClient)
            var createClient = window.supabase.createClient || window.supabase.default.createClient;
            supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
                global: { headers: { Authorization: "Bearer " + token } }
            });

            var resBiz = await supabase.from("businesses").select("*").eq("id", bizId).single();
            if (resBiz.error) throw new Error("Помилка бази: " + resBiz.error.message);
            bizData = resBiz.data;

            if (String(bizData.owner_id) === String(userId)) {
                userRole = "admin";
            } else {
                var resStaff = await supabase.from("staff").select("*").eq("user_id", userId).eq("business_id", bizId).single();
                if (resStaff.data && resStaff.data.role === "manager") userRole = "admin";
            }

            document.getElementById("role-badge").innerHTML = (userRole === "admin" ? "👑 Адмін" : "🛵 Кур'єр");

            if (userRole === "admin") {
                var resC = await supabase.from("staff").select("*").eq("business_id", bizId).eq("role", "courier");
                availableCouriers = resC.data || [];
                var sel = document.getElementById("courier-select");
                sel.innerHTML = '<option value="" disabled selected>Оберіть кур\'єра...</option>';
                availableCouriers.forEach(function(c) {
                    sel.innerHTML += '<option value="' + (c.user_id || c.tg_id) + '">' + c.name + '</option>';
                });
            }

            mapboxgl.accessToken = MAPBOX_TOKEN;
            map = new mapboxgl.Map({
                container: "map",
                style: "mapbox://styles/mapbox/streets-v11",
                center: [parseFloat(bizData.lng), parseFloat(bizData.lat)],
                zoom: 13
            });

            map.on("load", function() {
                document.getElementById("loading-screen").style.display = "none";
                loadOrders();
                setInterval(loadOrders, 10000);
            });

            document.getElementById("btn-assign").onclick = assignOrder;
            document.getElementById("btn-cancel").onclick = function() { document.getElementById("bottom-sheet").classList.remove("active"); };

        } catch (e) {
            logError("Помилка запуску: " + e.message);
        }
    }

    async function loadOrders() {
        var res = await supabase.from("orders").select("*").eq("business_id", bizData.id).eq("status", "pending");
        activeOrdersData = res.data || [];
        markers.forEach(function(m) { m.remove(); });
        markers = [];

        activeOrdersData.forEach(function(order) {
            if (userRole === "courier" && String(order.courier_id) !== String(userId)) return;

            var el = document.createElement("div");
            el.className = "custom-marker";
            var pinClass = (!order.courier_id || order.courier_id === "unassigned") ? "pin-free" : (String(order.courier_id) === String(userId) ? "pin-mine" : "pin-others");
            
            el.innerHTML = '<div class="marker-label">' + order.address.split(",")[0] + '</div>' +
                           '<div class="' + pinClass + '"><i class="fa-solid fa-location-dot"></i></div>';

            el.onclick = function() {
                selectedOrder = order;
                document.getElementById("panel-address").innerText = order.address.split(",")[0];
                document.getElementById("panel-pay").innerText = order.pay_type + ": " + order.amount;
                
                if (userRole === "admin") {
                    document.getElementById("admin-actions").style.display = (pinClass === "pin-free" ? "block" : "none");
                    document.getElementById("panel-courier-row").style.display = (pinClass === "pin-free" ? "none" : "flex");
                } else {
                    document.getElementById("courier-actions").style.display = "block";
                }
                document.getElementById("bottom-sheet").classList.add("active");
            };

            var m = new mapboxgl.Marker(el).setLngLat([parseFloat(order.lon), parseFloat(order.lat)]).addTo(map);
            markers.push(m);
        });
    }

    async function assignOrder() {
        var cid = document.getElementById("courier-select").value;
        if (!cid) return;
        await supabase.from("orders").update({ courier_id: cid }).eq("id", selectedOrder.id);
        tg.sendData(JSON.stringify({ action: "assign_order", order_id: selectedOrder.id, courier_id: cid }));
        document.getElementById("bottom-sheet").classList.remove("active");
        loadOrders();
    }

    var attempts = 0;
    function checkLibs() {
        if (window.supabase && window.mapboxgl && window.Telegram) {
            startApp();
        } else {
            attempts++;
            if (attempts > 30) return logError("Бібліотеки не завантажились за 10 сек. Перевірте інтернет.");
            setTimeout(checkLibs, 300);
        }
    }
    checkLibs();
</script>
</body>
</html>
