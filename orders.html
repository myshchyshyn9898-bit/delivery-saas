<!DOCTYPE html>
<html lang="uk">
<head>
        <meta name="server-url" content="https://web-production-df704.up.railway.app">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Активні та Архів</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg-color: #f4f7f9; --text-main: #111418; --text-muted: #8a8d91; --primary: #ff7652; --surface: #ffffff; --success: #34C759; --info: #4A6CF7; --danger: #ff3b30; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-main); padding-bottom: 30px; } 

        .header { background: var(--surface); padding: 20px; border-bottom: 1px solid #edf1f7; position: sticky; top: 0; z-index: 10; font-size: 18px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        
        /* --- ПЕРЕМИКАЧ МОВИ --- */
        .lang-switcher {
            background: rgba(255,255,255,0.9);
            padding: 6px 10px; border-radius: 10px; font-size: 11px; font-weight: 800;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 6px; border: 1px solid #edf1f7;
            transition: 0.2s; color: var(--text-main);
        }
        .lang-switcher:active { transform: scale(0.95); }
        .lang-menu {
            position: absolute; top: 60px; right: 20px; z-index: 1000;
            background: var(--surface); border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #edf1f7; overflow: hidden;
            display: none; flex-direction: column; min-width: 130px;
        }
        .lang-menu.show { display: flex; animation: dropIn 0.2s ease; }
        .lang-item { padding: 12px 15px; font-size: 13px; font-weight: 700; cursor: pointer; border-bottom: 1px solid #edf1f7; transition: 0.1s; display: flex; align-items: center; gap: 10px; color: var(--text-main);}
        .lang-item:last-child { border-bottom: none; }
        .lang-item:active { background: #f1f5f9; color: var(--primary); }
        @keyframes dropIn { 0% { opacity: 0; transform: translateY(-5px); } 100% { opacity: 1; transform: translateY(0); } }

        .container { padding: 15px; }

        .stat-card { background: var(--surface); border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #edf1f7; margin-bottom: 15px; border-left: 5px solid var(--primary); }
        .stat-title { font-size: 12px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        .stat-val { font-size: 26px; font-weight: 900; color: var(--text-main); }

        .time-filter { display: flex; background: #edf1f7; border-radius: 12px; padding: 4px; margin-bottom: 15px; }
        .filter-btn { flex: 1; text-align: center; padding: 8px 0; font-size: 13px; font-weight: 600; color: var(--text-muted); border-radius: 8px; transition: 0.2s; cursor: pointer;}
        .filter-btn.active { background: var(--surface); color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .tabs { display: flex; background: #edf1f7; border-radius: 14px; padding: 5px; margin-bottom: 20px; }
        .tab-btn { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 700; color: var(--text-muted); border-radius: 10px; transition: 0.2s; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .tab-btn i { font-size: 16px; opacity: 0.7; transition: 0.2s; }
        .tab-btn.active { background: var(--surface); color: var(--text-main); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .tab-btn.active i { color: var(--primary); opacity: 1; }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .order-card { background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #edf1f7; }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #edf1f7; padding-bottom: 10px; }
        .order-id { font-size: 15px; font-weight: 900; color: var(--text-main); }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .badge-pending { background: rgba(255, 176, 32, 0.1); color: #FFB020; }
        .badge-completed { background: rgba(52, 199, 89, 0.1); color: var(--success); }

        .order-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: var(--text-main); }
        .order-icon { width: 24px; color: var(--text-muted); text-align: center; font-size: 14px; }
        
        .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px dashed #edf1f7; }
        .order-price { font-size: 18px; font-weight: 900; color: var(--primary); }
        .order-payment { font-size: 12px; font-weight: 700; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 40px; margin-bottom: 15px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="header">
        <div>📋 <span data-i18n="title_main"><span data-i18n="title_main">Замовлення</span></span></div>
        <div class="lang-switcher" onclick="toggleLangMenu()">
            <i class="fa-solid fa-globe"></i> <span id="current-lang-display">UK</span>
        </div>
        <div class="lang-menu" id="lang-menu">
            <div class="lang-item" onclick="setLanguage('uk')">🇺🇦 Українська</div>
            <div class="lang-item" onclick="setLanguage('en')">🇬🇧 English</div>
            <div class="lang-item" onclick="setLanguage('pl')">🇵🇱 Polski</div>
            <div class="lang-item" onclick="setLanguage('ru')">🇷🇺 Русский</div>
        </div>
    </div>

    <div class="container">
        <div class="stat-card">
            <div class="stat-title" data-i18n="earned"><span data-i18n="earned">Зароблено за період</span></div>
            <div class="stat-val" id="total-earned">0.00 zł</div>
        </div>

        <div class="time-filter">
            <div class="filter-btn active" onclick="setFilter(this, 'today')" data-i18n="tab_today"><span data-i18n="tab_today">Сьогодні</span></div>
            <div class="filter-btn" onclick="setFilter(this, 'week')" data-i18n="tab_week"><span data-i18n="tab_week">Тиждень</span></div>
            <div class="filter-btn" onclick="setFilter(this, 'month')" data-i18n="tab_month"><span data-i18n="tab_month">Місяць</span></div>
        </div>

        <div class="tabs">
            <div class="tab-btn active" onclick="switchTab('active', this)">
                <i class="fa-solid fa-list-ul"></i> <span data-i18n="tab_active"><span data-i18n="tab_active">Активні</span></span>
            </div>
            <div class="tab-btn" onclick="switchTab('closed', this)">
                <i class="fa-solid fa-check-double"></i> <span data-i18n="tab_closed"><span data-i18n="tab_closed">Закриті</span></span>
            </div>
        </div>

        <div id="tab-active" class="tab-content active">
            <div id="list-active">
                <div style="text-align: center; color: var(--text-muted); padding: 20px;">
                    <i class="fa-solid fa-spinner fa-spin"></i> <span data-i18n="loading">ЗАВАНТАЖЕННЯ ДАНИХ...</span>
                </div>
            </div>
        </div>

        <div id="tab-closed" class="tab-content">
            <div id="list-closed">
                <div style="text-align: center; color: var(--text-muted); padding: 20px;">
                    <i class="fa-solid fa-spinner fa-spin"></i> <span data-i18n="loading">ЗАВАНТАЖЕННЯ ДАНИХ...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==============================================
        // --- СИСТЕМА БАГАТОМОВНОСТІ ---
        // ==============================================
        let tgLang = 'en';
        try { 
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
                tgLang = window.Telegram.WebApp.initDataUnsafe.user.language_code || 'en';
            } 
        } catch(e) { console.error("Помилка Telegram WebApp:", e); }

        let savedLang = localStorage.getItem('appLang');
        let currentLang = savedLang || tgLang;
        if (!['uk', 'ru', 'pl', 'en'].includes(currentLang)) currentLang = 'en';

        const i18n = {
            'uk': {
                title_main: "Замовлення", earned: "Зароблено за період",
                tab_today: "Сьогодні", tab_week: "Тиждень", tab_month: "Місяць",
                tab_active: "Активні", tab_closed: "Закриті", loading: "ЗАВАНТАЖЕННЯ ДАНИХ...",
                status_pending: "В ДОРОЗІ", status_done: "ДОСТАВЛЕНО",
                pay_cash: "Готівка", pay_term: "Термінал", pay_online: "Онлайн",
                apt: "Кв:", code: "Код:", unknown_c: "Невідомий кур'єр",
                empty_active: "Немає активних замовлень", empty_closed: "За вибраний період немає закритих замовлень",
                err_biz: "ID бізнесу відсутній!", err_supa: "❌ Supabase SDK не підключена.",
                err_supabase: "❌ Supabase не завантажилась. Перевірте інтернет.",
                err_exec: "🚨 Помилка: ", err_filter: "❌ Помилка фільтра: ", err_prefix: "❌ Помилка: ",
                close_cash: "💵 Готівка", close_term: "🏧 Термінал",
                err_tabs: "Помилка вкладок: ", err_cancelled: "❌ Скасовано", err_server: "⏳ Сервер не відповідає. Оновіть сторінку.",
            },
            'ru': {
                title_main: "Заказы", earned: "Заработано за период",
                tab_today: "Сегодня", tab_week: "Неделя", tab_month: "Месяц",
                tab_active: "Активные", tab_closed: "Закрытые", loading: "ЗАГРУЗКА ДАННЫХ...",
                status_pending: "В ПУТИ", status_done: "ДОСТАВЛЕНО",
                pay_cash: "Наличные", pay_term: "Терминал", pay_online: "Онлайн",
                apt: "Кв:", code: "Код:", unknown_c: "Неизвестный курьер",
                empty_active: "Нет активных заказов", empty_closed: "За выбранный период нет закрытых заказов",
                err_biz: "ID бизнеса отсутствует!", err_supa: "❌ Supabase SDK не подключена.",
                err_supabase: "❌ Supabase не загрузилась.", err_exec: "🚨 Ошибка: ",
                err_filter: "❌ Ошибка фильтра: ", err_prefix: "❌ Ошибка: ",
                close_cash: "💵 Наличные", close_term: "🏧 Терминал",
                err_tabs: "Ошибка вкладок: ", err_cancelled: "❌ Отменено", err_server: "⏳ Сервер не отвечает. Обновите страницу.",
            },
            'pl': {
                title_main: "Zamówienia", earned: "Zarobiono w okresie",
                tab_today: "Dzisiaj", tab_week: "Tydzień", tab_month: "Miesiąc",
                tab_active: "Aktywne", tab_closed: "Zamknięte", loading: "ŁADOWANIE DANYCH...",
                status_pending: "W TRASIE", status_done: "DOSTARCZONO",
                pay_cash: "Gotówka", pay_term: "Terminal", pay_online: "Online",
                apt: "Mieszkanie:", code: "Kod:", unknown_c: "Nieznany kurier",
                empty_active: "Brak aktywnych zamówień", empty_closed: "Brak zamkniętych zamówień w tym okresie",
                err_biz: "Brak ID firmy!", err_supa: "❌ Supabase SDK nie jest podłączona.",
                err_supabase: "Supabase nie załadował się.", err_exec: "🚨 Błąd: ",
                err_filter: "❌ Błąd filtra: ", err_prefix: "❌ Błąd: ",
                close_cash: "💵 Gotówka", close_term: "🏧 Terminal",
                err_tabs: "Błąd zakładek: ", err_cancelled: "❌ Anulowano", err_server: "⏳ Serwer nie odpowiada. Odśwież stronę.",
            },
            'en': {
                title_main: "Orders", earned: "Earned in period",
                tab_today: "Today", tab_week: "Week", tab_month: "Month",
                tab_active: "Active", tab_closed: "Closed", loading: "LOADING DATA...",
                status_pending: "ON THE WAY", status_done: "DELIVERED",
                pay_cash: "Cash", pay_term: "Terminal", pay_online: "Online",
                apt: "Apt:", code: "Code:", unknown_c: "Unknown courier",
                empty_active: "No active orders", empty_closed: "No closed orders for the selected period",
                err_biz: "Business ID is missing!", err_supa: "❌ Supabase SDK not connected.",
                err_supabase: "Supabase failed to load.", err_exec: "🚨 Error: ",
                err_filter: "❌ Filter error: ", err_prefix: "❌ Error: ",
                close_cash: "💵 Cash", close_term: "🏧 Terminal",
                err_tabs: "Tab error: ", err_cancelled: "❌ Cancelled", err_server: "⏳ Server not responding. Reload the page.",
            }
        };

        function t(key) { return i18n[currentLang][key] || key; }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('appLang', lang); 
            document.getElementById('current-lang-display').innerText = lang.toUpperCase();
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
            });

            // Якщо Дашборд уже завантажив дані, перекладаємо списки
            // ✅ FIX: не викликаємо loadArchiveData при зміні мови — вона вже завантажена
        }

        function toggleLangMenu() { document.getElementById('lang-menu').classList.toggle('show'); }
        document.addEventListener('click', (e) => { if (!e.target.closest('.lang-switcher') && !e.target.closest('.lang-menu')) document.getElementById('lang-menu').classList.remove('show'); });


        // ==============================================
        // --- ВАШ ОРИГІНАЛЬНИЙ КОД БЕЗ ЗМІН ЛОГІКИ ---
        // ==============================================
        window.onerror = function(msg, url, line) { console.error('JS Error:', msg, 'line:', line); };

        let currentFilter = 'today';
        let supabaseClient = null; // ✅ FIX: global scope щоб closeOrderFromList мав доступ

        function switchTab(tabId, element) {
            try {
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('tab-' + tabId).classList.add('active');
                element.classList.add('active');
            } catch(e) {
                alert(t("err_tabs") + e);
            }
        }

        // ДОДАНО: Безпечна зміна фільтрів без прив'язки до українського тексту
        function setFilter(el, filterType) {
            try {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                el.classList.add('active');
                
                if (filterType) { currentFilter = filterType; } 
                else {
                    const txt = el.getAttribute('data-i18n');
                    if (txt === 'tab_today') currentFilter = 'today';
                    else if (txt === 'tab_week') currentFilter = 'week';
                    else if (txt === 'tab_month') currentFilter = 'month';
                }
                
                loadArchiveData();
            } catch(e) {
                alert(t("err_filter") + e);
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const bizId = urlParams.get('biz_id');
        const authToken = urlParams.get('token');
        const tgId = urlParams.get('tg_id');
        let currencySymbol = "zł";

                // SERVER_URL: автоматично визначається або береться з мета-тегу
        const RAILWAY_DOMAIN = (function() {
            const meta = document.querySelector('meta[name="server-url"]');
            if (meta && meta.content) return meta.content.replace(/\/$/, '');
            return "https://delivery-saas-production-3fe6.up.railway.app";
        })();
        let _supabaseCfgCache = null;
        async function getSupabaseCfg() {
            if (!_supabaseCfgCache) {
                const ctrl = new AbortController();
                const tid = setTimeout(() => ctrl.abort(), 8000);
                try {
                    const r = await fetch(RAILWAY_DOMAIN + '/config', { signal: ctrl.signal });
                    clearTimeout(tid);
                    if (!r.ok) throw new Error('Config ' + r.status);
                    _supabaseCfgCache = await r.json();
                } catch(e) {
                    clearTimeout(tid);
                    throw e.name === 'AbortError' ? new Error(t('err_server')) : e;
                }
            }
            return _supabaseCfgCache;
        }

        async function loadArchiveData() {
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.expand();
                }

                document.getElementById('total-earned').innerText = '0.00 ' + currencySymbol;
                document.getElementById('list-active').innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 20px;"><i class="fa-solid fa-spinner fa-spin"></i> ${t('loading')}</div>`;
                document.getElementById('list-closed').innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 20px;"><i class="fa-solid fa-spinner fa-spin"></i> ${t('loading')}</div>`;

                if (!bizId) throw new Error(t('err_biz'));
                if (!window.supabase) throw new Error(t('err_supa'));

                const cfg = await getSupabaseCfg();
                // ✅ FIX: використовуємо глобальний supabaseClient
                if (authToken) {
                    supabaseClient = window.supabase.createClient(cfg.supabase_url, cfg.supabase_key, {
                        global: { headers: { Authorization: `Bearer ${authToken}`, 'x-tg-user-id': tgId || '' } }
                    });
                } else {
                    supabaseClient = window.supabase.createClient(cfg.supabase_url, cfg.supabase_key);
                }

                let startDate = new Date();
                if (currentFilter === 'today') {
                    startDate.setHours(0, 0, 0, 0);
                } else if (currentFilter === 'week') {
                    startDate.setDate(startDate.getDate() - 7);
                } else if (currentFilter === 'month') {
                    startDate.setDate(startDate.getDate() - 30);
                }

                const { data: biz } = await supabaseClient.from('businesses').select('currency').eq('id', bizId).single();
                if (biz) currencySymbol = biz.currency || "zł";

                const { data: staff } = await supabaseClient.from('staff').select('user_id, name').eq('business_id', bizId);
                const couriersMap = {};
                if (staff) {
                    staff.forEach(s => { couriersMap[s.user_id] = s.name; });
                }

                // Визначаємо роль: кур'єр бачить тільки свої замовлення
                let ordersQuery = supabaseClient.from('orders')
                    .select('*')
                    .eq('business_id', bizId)
                    .gte('created_at', startDate.toISOString())
                    .order('created_at', { ascending: false })
                    .limit(5000);

                if (tgId) {
                    const { data: myStaff } = await supabaseClient.from('staff')
                        .select('role').eq('user_id', tgId).eq('business_id', bizId).single();
                    if (myStaff && myStaff.role === 'courier') {
                        ordersQuery = ordersQuery.eq('courier_id', tgId);
                    }
                }

                const { data: orders, error: ordersError } = await ordersQuery;

                if (ordersError) throw ordersError;

                const listActive = document.getElementById('list-active');
                const listClosed = document.getElementById('list-closed');
                
                let totalEarned = 0;
                let activeCount = 0;
                let closedCount = 0;

                // --- НОВИЙ ОПТИМІЗОВАНИЙ БЛОК ---
                let activeHtmlString = '';
                let closedHtmlString = '';

                if (orders && orders.length > 0) {
                    orders.forEach(order => {
                        const shortId = String(order.id).substring(0, 6).toUpperCase();

                        // 🔒 ЗАХИСТ ВІД XSS: Екрануємо адресу та імена
                        const safeAddress = String(order.address || '').replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        const safeCourierName = String(couriersMap[order.courier_id] || t('unknown_c')).replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        
                        let payText = t('pay_online'), payIcon = 'fa-globe', payColor = '#a855f7';
                        if (order.pay_type === 'cash') { payText = t('pay_cash'); payIcon = 'fa-money-bill-wave'; payColor = '#34C759'; }
                        if (order.pay_type === 'terminal') { payText = t('pay_term'); payIcon = 'fa-credit-card'; payColor = '#4A6CF7'; }
                        
                        let detailsHtml = '';
                        if (order.apt || order.code) {
                            let textDetails = '';
                            if (order.apt) textDetails += `${t('apt')} ` + order.apt + ' ';
                            if (order.code) textDetails += `${t('code')} ` + order.code;
                            detailsHtml = '<div style="font-size: 12px; color: var(--text-muted); margin-top: 3px;">' + textDetails + '</div>';
                        }

                        let statusBadge = order.status === 'completed'
                            ? `<div class="badge badge-completed">${t('status_done')}</div>`
                            : order.status === 'cancelled'
                            ? `<div class="badge" style="background:rgba(239,68,68,.1);color:#ef4444;">${t("err_cancelled")}</div>`
                            : `<div class="badge badge-pending">${t('status_pending')}</div>`;

                        const cardHtml = `
                            <div class="order-card">
                                <div class="order-header">
                                    <div class="order-id">#${shortId}</div>
                                    ${statusBadge}
                                </div>
                                <div class="order-row">
                                    <div class="order-icon"><i class="fa-solid fa-location-dot"></i></div>
                                    <div>
                                        <div>${safeAddress}</div>
                                        ${detailsHtml}
                                    </div>
                                </div>
                                <div class="order-row">
                                    <div class="order-icon"><i class="fa-solid fa-motorcycle"></i></div>
                                    <div>${safeCourierName}</div>
                                </div>
                                <div class="order-footer">
                                    <div class="order-payment">
                                        <i class="fa-solid ${payIcon}" style="color: ${payColor}"></i> ${payText}
                                    </div>
                                    <div class="order-price">${parseFloat(order.amount).toFixed(2)} ${currencySymbol}</div>
                                </div>
                                ${order.status !== 'completed' && String(order.courier_id) === String(tgId) ? `
                                <div style="display:flex;gap:8px;margin-top:10px;">
                                    <button onclick="closeOrderFromList('${order.id}','cash','${order.amount}',this)" style="flex:1;padding:10px;background:#34C759;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;">💵 ${t('pay_cash')}</button>
                                    <button onclick="closeOrderFromList('${order.id}','terminal','${order.amount}',this)" style="flex:1;padding:10px;background:#4A6CF7;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;">🏧 ${t('pay_term')}</button>
                                </div>` : ''}
                            </div>
                        `;

                        if (order.status === 'completed' || order.status === 'cancelled') {
                            closedHtmlString += cardHtml;
                            if (order.status === 'completed') totalEarned += parseFloat(order.amount || 0);
                            closedCount++;
                        } else if (order.status === 'pending' || order.status === 'delivering') {
                            activeHtmlString += cardHtml;
                            activeCount++;
                        }
                    });
                }

                document.getElementById('total-earned').innerText = totalEarned.toFixed(2) + ' ' + currencySymbol;

                // Вставляємо згенерований HTML ОДИН РАЗ
                if (activeCount > 0) {
                    listActive.innerHTML = activeHtmlString;
                } else {
                    listActive.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-box-open"></i></div><div>${t('empty_active')}</div></div>`;
                }

                if (closedCount > 0) {
                    listClosed.innerHTML = closedHtmlString;
                } else {
                    listClosed.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fa-solid fa-check-double"></i></div><div>${t('empty_closed')}</div></div>`;
                }
                // --- КІНЕЦЬ БЛОКУ ---

            } catch (error) {
                alert(t('err_exec') + error.message);
                document.getElementById('list-active').innerHTML = '<div class="empty-state" style="color:red;">❌ ' + error.message + '</div>';
                document.getElementById('list-closed').innerHTML = '';
            }
        }

        // ЗАПУСКАЄМО
        setLanguage(currentLang);
        async function closeOrderFromList(orderId, payType, amount, btn) {
            if (!confirm(t('status_pending') + ' → ' + (payType === 'cash' ? t('pay_cash') : t('pay_term')) + '?')) return;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            try {
                var updateData = {
                    status: 'completed',
                    pay_type: payType,
                    completed_at: new Date().toISOString()
                };
                var res = await supabaseClient.from('orders')
                    .update(updateData)
                    .eq('id', orderId)
                    .eq('courier_id', tgId)
                    .eq('status', 'delivering');
                if (res.error) throw res.error;
                // Notify Railway bot
                await fetch(RAILWAY_DOMAIN + '/api/order_closed', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
                    body: JSON.stringify({ order_id: orderId, pay_type: payType })
                }).catch(function(){});
                // Reload
                await loadArchiveData();
            } catch(e) {
                btn.disabled = false;
                btn.innerHTML = t('pay_cash');
                alert(t('err_prefix') + e.message);
            }
        }

document.addEventListener('DOMContentLoaded', function() {
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
    setLanguage(currentLang);
    loadArchiveData();
});
</script>
