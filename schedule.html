<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="server-url" content="https://delivery-saas-production-3fe6.up.railway.app">
    <title>DeliPro — Графік</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap');

        :root {
            --bg:        #f3f6f8;
            --surface:   #ffffff;
            --primary:   #FF5A5F;
            --primary-g: rgba(255,90,95,0.12);
            --success:   #10b981;
            --success-g: rgba(16,185,129,0.12);
            --info:      #3b82f6;
            --text:      #0f172a;
            --muted:     #64748b;
            --border:    #f1f5f9;
            --radius:    20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent; user-select: none; }

        body { background: var(--bg); color: var(--text); padding-bottom: 110px; }

        /* ── LOADER ── */
        #loader { position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 16px; z-index: 9999; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #load-icon.fa-spin { animation: spin 0.7s linear infinite; }

        /* ── HEADER ── */
        .header { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
            padding: 18px 20px 14px; border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; align-items: center; justify-content: space-between; }
        .header-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
        .header-badge { font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.5px; padding: 4px 10px; border-radius: 8px;
            background: var(--primary-g); color: var(--primary); }

        /* ── MONTH TABS ── */
        .month-wrap { padding: 14px 20px 0; }
        .month-scroll { display: flex; gap: 6px; overflow-x: auto;
            scrollbar-width: none; padding-bottom: 2px; }
        .month-scroll::-webkit-scrollbar { display: none; }
        .m-tab { flex: 0 0 auto; padding: 9px 18px; border-radius: 12px;
            font-size: 13px; font-weight: 700; color: var(--muted);
            background: var(--surface); border: 1.5px solid var(--border);
            cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .m-tab.active { background: var(--primary); color: #fff;
            border-color: var(--primary);
            box-shadow: 0 4px 14px rgba(255,90,95,0.3); }
        .m-tab-add { flex: 0 0 auto; padding: 9px 16px; border-radius: 12px;
            font-size: 13px; font-weight: 700; color: var(--primary);
            background: transparent; border: 1.5px dashed var(--primary);
            cursor: pointer; transition: 0.2s; }
        .m-tab-add:active { background: var(--primary-g); }

        /* ── TABLE WRAPPER ── */
        .section-label { font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--muted); padding: 18px 20px 8px; }

        .table-card { background: var(--surface); border-radius: var(--radius);
            margin: 0 12px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.03); overflow: hidden; }

        .group-header { display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; border-bottom: 1px solid var(--border); }
        .group-name { font-size: 15px; font-weight: 800; color: var(--text); outline: none; }
        .group-name:focus { color: var(--primary); border-bottom: 1.5px solid var(--primary); }
        .btn-del-group { background: none; border: none; color: var(--muted);
            font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 8px; transition: 0.2s; }
        .btn-del-group:active { background: rgba(239,68,68,0.1); color: var(--primary); }

        .tbl-scroll { overflow-x: auto; scrollbar-width: thin;
            scrollbar-color: var(--border) transparent; }
        .tbl-scroll::-webkit-scrollbar { height: 3px; }
        .tbl-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }

        /* sticky name col */
        .col-name { position: sticky; left: 0; background: var(--surface); z-index: 3;
            min-width: 110px; max-width: 110px; padding: 10px 12px;
            font-size: 13px; font-weight: 700; color: var(--text);
            border-right: 1px solid var(--border); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; }
        .col-name::after { content: ''; position: absolute; top: 0; right: 0;
            width: 8px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.03), transparent); }

        th.col-name { font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--muted); padding: 10px 12px;
            border-bottom: 1px solid var(--border); }

        .col-day-head { min-width: 38px; max-width: 38px; text-align: center;
            padding: 6px 2px 0; border-bottom: 1px solid var(--border); }
        .day-num { font-size: 13px; font-weight: 800; color: var(--text); }
        .day-name { font-size: 9px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.3px; color: var(--muted); padding-bottom: 6px; }

        /* totals */
        .col-total-head { min-width: 48px; text-align: center; padding: 6px 4px 0;
            border-bottom: 1px solid var(--border);
            border-left: 1px dashed #dbe0e5; }
        .col-total-head .day-name { color: var(--primary); }

        /* rows */
        tr.emp-row td { border-bottom: 1px solid var(--border); }
        tr.emp-row:last-child td { border-bottom: none; }

        /* day cell */
        .cell-day { min-width: 38px; max-width: 38px; height: 40px;
            text-align: center; vertical-align: middle; padding: 3px 2px; }

        .day-slot { width: 32px; height: 32px; border-radius: 9px; margin: 0 auto;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.18s; position: relative;
            background: #f4f6f9; }
        .day-slot:active { transform: scale(0.88); }
        .day-slot svg { width: 14px; height: 14px; opacity: 0; transition: 0.18s; }

        /* planned by admin — blue dot */
        .day-slot.planned { background: rgba(59,130,246,0.12); }
        .day-slot.planned svg.icon-planned { opacity: 1; }
        .day-slot.planned .slot-hours { display: flex; }

        /* worked by courier — green check */
        .day-slot.worked { background: var(--success-g); }
        .day-slot.worked svg.icon-worked { opacity: 1; }
        .day-slot.worked .slot-hours { display: flex; }

        /* both planned + worked */
        .day-slot.planned.worked { background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(16,185,129,0.1)); }
        .day-slot.planned.worked svg.icon-planned { opacity: 0; }
        .day-slot.planned.worked svg.icon-worked { opacity: 1; }

        .slot-hours { display: none; position: absolute; bottom: -1px; right: -1px;
            font-size: 8px; font-weight: 900; color: var(--muted);
            background: var(--surface); border-radius: 4px; padding: 0 2px;
            line-height: 1.5; }

        .cell-total { min-width: 48px; text-align: center; vertical-align: middle;
            padding: 3px 4px; border-left: 1px dashed #dbe0e5; }
        .badge-count { display: inline-flex; align-items: center; justify-content: center;
            min-width: 30px; padding: 5px 4px; border-radius: 8px;
            font-size: 11px; font-weight: 800; }
        .badge-shifts { background: #f1f5f9; color: var(--text); }
        .badge-hours  { background: var(--primary-g); color: var(--primary); }

        /* today highlight */
        .col-day-head.today .day-num { color: var(--primary); }
        .col-day-head.today .day-name { color: var(--primary); }
        .cell-day.today .day-slot { box-shadow: inset 0 0 0 1.5px rgba(255,90,95,0.35); }

        /* add employee btn */
        .btn-add-emp { display: flex; align-items: center; gap: 8px;
            margin: 10px 14px 14px; padding: 10px 14px; border-radius: 12px;
            background: transparent; border: 1.5px dashed var(--border);
            color: var(--muted); font-size: 13px; font-weight: 700;
            cursor: pointer; transition: 0.2s; width: calc(100% - 28px); }
        .btn-add-emp:active { background: var(--primary-g); border-color: var(--primary); color: var(--primary); }

        /* ── BOTTOM ACTIONS (admin only) ── */
        .bottom-actions { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 200; width: 90%; max-width: 420px; }
        .btn-fab { flex: 1; padding: 15px; border-radius: 18px; border: none;
            font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-fab:active { transform: scale(0.96); }
        .btn-fab-primary { background: var(--primary); color: #fff;
            box-shadow: 0 8px 24px rgba(255,90,95,0.35); }
        .btn-fab-secondary { background: var(--surface); color: var(--text);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); border: 1px solid var(--border); }

        /* ── EARNINGS CARD (non-owner) ── */
        .earn-section { margin: 0 12px 20px; }
        .earn-card { background: linear-gradient(135deg, var(--primary), #ff8a76);
            border-radius: var(--radius); padding: 20px;
            box-shadow: 0 10px 30px rgba(255,90,95,0.25); color: #fff;
            position: relative; overflow: hidden; }
        .earn-card::after { content: ''; position: absolute; right: -20px; bottom: -20px;
            width: 120px; height: 120px; border-radius: 50%;
            background: rgba(255,255,255,0.08); }
        .earn-label { font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.5px; opacity: 0.85; margin-bottom: 8px; }
        .earn-amount { font-size: 34px; font-weight: 900; letter-spacing: -1px;
            margin-bottom: 14px; }
        .earn-breakdown { display: flex; gap: 12px; flex-wrap: wrap; }
        .earn-item { background: rgba(255,255,255,0.18); border-radius: 10px;
            padding: 8px 12px; }
        .earn-item-val { font-size: 14px; font-weight: 800; }
        .earn-item-lbl { font-size: 10px; font-weight: 700; opacity: 0.8; margin-top: 1px; }

        /* ── BOTTOM SHEET (modal) ── */
        .overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.7);
            z-index: 1000; opacity: 0; visibility: hidden;
            transition: 0.3s; backdrop-filter: blur(4px); }
        .overlay.show { opacity: 1; visibility: visible; }
        .sheet { position: absolute; bottom: -100%; left: 0; right: 0;
            background: var(--surface); border-radius: 28px 28px 0 0;
            padding: 24px 20px 40px; transition: bottom 0.35s cubic-bezier(0.2,0.8,0.2,1);
            max-height: 85vh; overflow-y: auto; }
        .overlay.show .sheet { bottom: 0; }
        .sheet-handle { width: 44px; height: 4px; background: #cbd5e1;
            border-radius: 4px; margin: 0 auto 20px; }
        .sheet-title { font-size: 17px; font-weight: 900; margin-bottom: 18px;
            color: var(--text); }

        .sheet-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .sheet-btn { padding: 14px; border-radius: 14px; border: none;
            font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px; }
        .sheet-btn:active { transform: scale(0.96); }
        .sheet-btn-plan { background: rgba(59,130,246,0.1); color: var(--info); }
        .sheet-btn-clear { background: #f1f5f9; color: var(--muted); }

        .time-group { background: #f8fafc; border: 1px solid var(--border);
            border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between; }
        .time-group label { font-size: 13px; font-weight: 700; color: var(--muted); }
        .time-group input { border: none; background: transparent; font-size: 16px;
            font-weight: 800; color: var(--text); outline: none;
            text-align: right; font-family: inherit; }

        .btn-save { background: var(--primary); color: #fff; border: none;
            width: 100%; padding: 16px; border-radius: 16px; font-size: 15px;
            font-weight: 800; cursor: pointer; margin-top: 10px;
            box-shadow: 0 8px 24px rgba(255,90,95,0.3); transition: 0.2s; }
        .btn-save:active { transform: scale(0.97); }

        /* legend */
        .legend { display: flex; gap: 14px; padding: 10px 20px 14px; }
        .leg-item { display: flex; align-items: center; gap: 6px;
            font-size: 11px; font-weight: 700; color: var(--muted); }
        .leg-dot { width: 20px; height: 20px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; }
        .leg-planned { background: rgba(59,130,246,0.12); }
        .leg-worked  { background: var(--success-g); }

        /* toast */
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-10px);
            background: var(--text); color: #fff; padding: 10px 18px; border-radius: 12px;
            font-size: 13px; font-weight: 700; opacity: 0; transition: 0.25s; z-index: 9999;
            white-space: nowrap; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="loader">
    <i id="load-icon" class="fa-solid fa-circle-notch fa-spin" style="font-size:36px;color:var(--primary);margin-bottom:14px;"></i>
    <p id="load-text" style="font-size:14px;font-weight:700;color:var(--muted);margin:0;text-align:center;padding:0 30px;"><span data-sched-i18n="loading">Завантаження...</span></p>
</div>

<div id="app" style="display:none;">

    <div class="header">
        <div class="header-row">
            <div class="header-title"><span data-sched-i18n="title">Графік команди</span></div>
            <span class="header-badge" id="role-badge">Кур'єр</span>
        </div>
    </div>

    <!-- Month tabs -->
    <div class="month-wrap">
        <div class="month-scroll" id="month-tabs"></div>
    </div>

    <!-- Legend -->
    <div class="legend">
        <div class="leg-item">
            <div class="leg-dot leg-planned">
                <svg viewBox="0 0 14 14" fill="none" width="12" height="12">
                    <circle cx="7" cy="7" r="3.5" fill="#3b82f6"/>
                </svg>
            </div>
            Заплановано
        </div>
        <div class="leg-item">
            <div class="leg-dot leg-worked">
                <svg viewBox="0 0 14 14" fill="none" width="12" height="12">
                    <path d="M3 7.5L5.5 10L11 4.5" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            Відпрацьовано
        </div>
    </div>

    <!-- Groups container -->
    <div id="groups-container"></div>

    <!-- Earnings card (hidden for owner) -->
    <div class="earn-section" id="earn-section" style="display:none;">
        <div class="earn-card">
            <div class="earn-label"><span data-sched-i18n="earn_title">Мій заробіток за місяць</span></div>
            <div class="earn-amount" id="earn-total">0.00 <span style="font-size:18px;opacity:0.8;" id="earn-currency">zł</span></div>
            <div class="earn-breakdown">
                <div class="earn-item">
                    <div class="earn-item-val" id="earn-hours">0 год</div>
                    <div class="earn-item-lbl"><span data-sched-i18n="worked_lbl">Відпрацьовано</span></div>
                </div>
                <div class="earn-item">
                    <div class="earn-item-val" id="earn-shifts-count">0 змін</div>
                    <div class="earn-item-lbl"><span data-sched-i18n="shifts_lbl">Змін</span></div>
                </div>
                <div class="earn-item">
                    <div class="earn-item-val" id="earn-orders">0 зам.</div>
                    <div class="earn-item-lbl"><span data-sched-i18n="orders_lbl">Замовлень</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Admin bottom actions -->
    <div class="bottom-actions" id="admin-actions" style="display:none;">
        <button class="btn-fab btn-fab-secondary" onclick="addGroup()">
            <i class="fa-solid fa-plus"></i> Нова група
        </button>
        <button class="btn-fab btn-fab-primary" onclick="saveSchedule()">
            <i class="fa-solid fa-floppy-disk"></i> Зберегти
        </button>
    </div>

</div>

<!-- Modal overlay -->
<div class="overlay" id="overlay" onclick="closeSheet()">
    <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheet-title" id="sheet-title"><span data-sched-i18n="shift_lbl">Зміна</span></div>

        <div class="sheet-actions">
            <button class="sheet-btn sheet-btn-plan" onclick="setPlanned()">
                <svg viewBox="0 0 16 16" fill="none" width="16" height="16">
                    <circle cx="8" cy="8" r="4" fill="#3b82f6"/>
                </svg>
                Запланувати
            </button>
            <button class="sheet-btn sheet-btn-clear" onclick="clearSlot()">
                <svg viewBox="0 0 16 16" fill="none" width="16" height="16">
                    <path d="M4 4L12 12M12 4L4 12" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
                </svg>
                Очистити
            </button>
        </div>

        <!-- Плановий час -->
        <div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;margin-top:4px;">
            <i class="fa-solid fa-calendar-days" style="margin-right:4px;color:#3b82f6;"></i>Плановий час
        </div>
        <div class="time-group">
            <label><span data-sched-i18n="lbl_start">Початок</span></label>
            <input type="time" id="time-start" value="10:00">
        </div>
        <div class="time-group" style="margin-top:6px;">
            <label><span data-sched-i18n="lbl_end">Кінець</span></label>
            <input type="time" id="time-end" value="22:00">
        </div>

        <!-- Фактичні години (перевизначають планові та бот-зміни) -->
        <div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;margin-top:14px;">
            <i class="fa-solid fa-pen-to-square" style="margin-right:4px;color:var(--primary);"></i>Фактичні години (для ЗП)
        </div>
        <div class="time-group">
            <label><span data-sched-i18n="hours_worked">Годин відпрацьовано</span></label>
            <input type="number" id="actual-hours" inputmode="decimal" min="0" max="24" step="0.5" placeholder="авто"
                style="border:none;background:transparent;font-size:16px;font-weight:800;
                color:var(--primary);outline:none;text-align:right;font-family:inherit;width:80px;">
        </div>
        <div style="font-size:11px;color:var(--muted);font-weight:600;margin-top:4px;padding:0 2px;">
            Залиш порожнім — автоматично з боту або планового часу
        </div>

        <button class="btn-save" onclick="saveSlot()" style="margin-top:14px;">
            <i class="fa-solid fa-floppy-disk"></i> Зберегти
        </button>
    </div>
</div>

<!-- Bottom sheet: Add staff -->
<div class="overlay" id="staff-overlay" onclick="closeStaffSheet()">
    <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Додати в групу <span id="staff-sheet-group" style="color:var(--primary);"></span></div>

        <div class="time-group">
            <label>Ім'я та Прізвище</label>
            <input type="text" id="staff-name" placeholder="Напр. Іван Петров" style="border:none;background:transparent;font-size:15px;font-weight:700;color:var(--text);outline:none;text-align:right;font-family:inherit;width:60%;">
        </div>

        <button class="btn-save" onclick="addStaffDirect()" style="margin-top:16px;">
            <i class="fa-solid fa-user-plus"></i> Додати
        </button>
    </div>
</div>

<!-- Bottom sheet: Add group -->
<div class="overlay" id="group-overlay" onclick="closeGroupSheet()">
    <div class="sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheet-title"><span data-sched-i18n="btn_add_group">Нова група</span></div>

        <div class="time-group">
            <label><span data-sched-i18n="lbl_group_name">Назва групи</span></label>
            <input type="text" id="group-name-input" placeholder="Кухня, Склад, Електрики..." style="border:none;background:transparent;font-size:15px;font-weight:700;color:var(--text);outline:none;text-align:right;font-family:inherit;width:60%;">
        </div>

        <button class="btn-save" onclick="createGroup()" style="margin-top:16px;">
            <i class="fa-solid fa-plus"></i> Створити групу
        </button>
    </div>
</div>


<div class="toast" id="toast"></div>

<script>// --- МОВА ---
var tgLang = 'en';
try {
    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
        tgLang = window.Telegram.WebApp.initDataUnsafe.user.language_code || 'en';
    }
} catch(e) {}
var savedLang = (typeof localStorage !== 'undefined') ? localStorage.getItem('appLang') : null;
var currentLang = savedLang || tgLang;
if (!['uk','ru','pl','en'].includes(currentLang)) currentLang = 'en';

var SCHED_I18N = {
    'uk': {
        jan: 'Січень',
        feb: 'Лютий',
        mar: 'Березень',
        apr: 'Квітень',
        may: 'Травень',
        jun: 'Червень',
        jul: 'Липень',
        aug: 'Серпень',
        sep: 'Вересень',
        oct: 'Жовтень',
        nov: 'Листопад',
        dec: 'Грудень',
        mon: 'пн',
        tue: 'вт',

async function initScheduleApp() {
    var _step = '...';
    function _alert(msg) {
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.showAlert(msg);
        }
        showError(msg);
    }

    try {
        // 1. Telegram
        _step = 'TG init';
        setLoad(SL.step1);
        if (window.Telegram && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            if (tg.setHeaderColor) tg.setHeaderColor('#ffffff');
            userId = tgId || (tg.initDataUnsafe && tg.initDataUnsafe.user
                ? String(tg.initDataUnsafe.user.id) : null);
        } else {
            userId = tgId || null;
        }

        // 2. Перевірки
        _step = 'params check';
        setLoad('bizId=' + (bizId||'немає') + ' token=' + (authToken?'є':'немає'));
        if (!bizId) { _alert('❌ bizId відсутній в URL'); return; }
        if (!authToken) { _alert('❌ token відсутній в URL'); return; }
        if (!window.supabase) { _alert('❌ Supabase SDK не завантажилась'); return; }

        // 3. Config
        _step = 'fetchConfig';
        setLoad(SL.step3);
        var cfg;
        try {
            cfg = await fetchConfig();
        } catch (cfgErr) {
            _alert('❌ /config помилка: ' + cfgErr.message);
            return;
        }
        if (!cfg || !cfg.supabase_url) {
            _alert('❌ /config повернув неправильні дані');
            return;
        }

        // 4. Supabase
        _step = 'supabase init';
        setLoad(SL.step4);
        supabase = window.supabase.createClient(cfg.supabase_url, cfg.supabase_key, {
            global: { headers: { Authorization: 'Bearer ' + authToken } }
        });

        // 5. Бізнес
        _step = 'loadBiz';
        setLoad(SL.step5);
        try {
            await loadBiz();
        } catch(e) {
            _alert('❌ Бізнес: ' + e.message + ' (bizId=' + bizId + ')');
            return;
        }

        // 6. Персонал
        _step = 'loadStaff';
        setLoad(SL.step6);
        try {
            await loadStaff();
        } catch(e) {
            _alert('❌ Персонал: ' + e.message);
            return;
        }

        // 7. Графік і зміни
        _step = 'loadSchedule';
        setLoad(SL.step7);
        await loadSchedule();

        _step = 'loadShifts';
        setLoad(SL.step8);
        await loadShifts();

        // 8. Рендер
        _step = 'render';
        setLoad(SL.step9);
        initMonths();
        renderAll();

        hide('loader');
        show('app');

        loadEarnings().catch(function(e) {
            console.warn('[schedule] loadEarnings:', e.message);
        });

    } catch(e) {
        _alert('❌ Крок [' + _step + ']: ' + (e.message || String(e)));
    }
}

var _supabaseCfgCache = null;
async function fetchConfig() {
    if (!_supabaseCfgCache) {
        var res;
        try { res = await fetch(RAILWAY_DOMAIN + '/config'); }
        catch (e) { throw new Error('Сервер недоступний: ' + e.message); }

        if (!res.ok) throw new Error('Помилка /config: HTTP ' + res.status);

        var cfg;
        try { cfg = await res.json(); }
        catch (e) { throw new Error('Невірна відповідь /config'); }

        if (!cfg.supabase_url || !cfg.supabase_key)
            throw new Error('В /config відсутні supabase_url або supabase_key');

        _supabaseCfgCache = cfg;
    }
    return _supabaseCfgCache;
}

async function addStaffDirect() {
    var name = (document.getElementById('staff-name').value || '').trim();
    if (!name) { toast("Введіть ім'я"); return; }
    var overlay = document.getElementById('staff-overlay');
    var role = (overlay && overlay.getAttribute('data-group-role')) || 'courier';
    try {
        var _res = await supabase.from('staff').insert({
            user_id: Date.now(),
            name: name,
            business_id: bizId,
            role: role
        }); var error = _res.error;
        if (error) throw error;
        toast('✅ Додано: ' + name);
        closeStaffSheet();
        await loadStaff();
        renderAll();
    } catch(e) {
        toast('❌ ' + e.message);
    }
}

    if (el) { el.classList.add('show'); setTimeout(function() { document.getElementById('group-name-input').focus(); }, 400); }
}
function closeGroupSheet() {
    var el = document.getElementById('group-overlay');
    if (el) el.classList.remove('show');
}
function createGroup() {
    var name = (document.getElementById('group-name-input').value || '').trim();
    if (!name) { toast('Введіть назву групи'); return; }
    // Перевіряємо чи не існує вже така група
    var exists = staffList.some(function(s) {
        return (s.role || '').toLowerCase() === name.toLowerCase();
    });
    if (exists) {
        closeGroupSheet();
        toast('Група "' + name + '" вже існує');
        return;
    }
    closeGroupSheet();
    // Одразу відкриваємо форму додавання першого співробітника
    // Група збережеться в БД тільки коли є хоч один реальний член
    openStaffSheet(name);
}
function addGroup() { openGroupSheet(); }

async function loadBiz() {
    var _res = await supabase.from('businesses').select('*').eq('id', bizId).single(); var data = _res.data; var error = _res.error;
    if (error || !data) throw new Error(SL.err_biz_prefix + ' не знайдено');
    bizData = data;
}

async function loadStaff() {
    var _res = await supabase.from('staff').select('*').eq('business_id', bizId); var data = _res.data;
    staffList = data || [];

    // determine role
    if (String(bizData.owner_id) === String(userId)) {
        userRole = 'owner';
    } else {
        var me = staffList.find(function(s) { return String(s.user_id) === String(userId); });
        userRole = (me && me.role) ? me.role : 'courier';
    }
    isAdmin = userRole === 'manager' || userRole === 'owner';

    document.getElementById('role-badge').textContent =

// ── MONTHS ──
function initMonths() {
    var now = new Date();
    // Show prev, current, next month
    var months = [];
    for (var d = -1; d <= 2; d++) {
        var dt = new Date(now.getFullYear(), now.getMonth() + d, 1);
        months.push(dt.getFullYear() + "-" + (dt.getMonth()+1 < 10 ? "0" : "") + (dt.getMonth()+1));
    }
    // Also add any months from scheduleData not in list
    Object.keys(scheduleData).forEach(function(mk) { if (!months.includes(mk)) months.unshift(mk); });
    months.sort();

    window._months = months;
    activeMonthKey = now.getFullYear() + "-" + (now.getMonth()+1 < 10 ? "0" : "") + (now.getMonth()+1);

    renderMonthTabs();
}

function renderMonthTabs() {
    var wrap = document.getElementById('month-tabs');
    wrap.innerHTML = '';
    window._months.forEach(function(mk) {
        var parts = mk.split('-');
        var label = MONTH_NAMES[parseInt(parts[1])-1] + ' ' + parts[0];
        var isActive = mk === activeMonthKey;

        var tab = document.createElement('div');
        tab.className = 'm-tab' + (isActive ? ' active' : '');
        tab.style.cssText = 'display:flex;align-items:center;gap:6px;';

        var labelSpan = document.createElement('span');
        labelSpan.textContent = label;
        labelSpan.onclick = function() {
            var prevMonth = activeMonthKey;
            // Автозбереження поточного місяця перед переключенням
            if (prevMonth !== mk && scheduleData[prevMonth]) {
                saveScheduleForMonth(prevMonth);
            }
            activeMonthKey = mk;
            renderMonthTabs();
            if (!shiftsCache[mk]) {
                loadShiftsForMonth(mk).then(function() { renderAll(); });
            } else {
                renderAll();
            }
            loadEarnings();
        };
        tab.appendChild(labelSpan);

        // × кнопка видалення (тільки для адміна, не для активного місяця)
        if (isAdmin && !isActive) {
            var del = document.createElement('span');
            del.textContent = '×';
            del.style.cssText = 'font-size:14px;font-weight:900;opacity:0.5;cursor:pointer;padding:0 2px;line-height:1;';
            del.title = 'Видалити місяць';
            del.onclick = function(e) {
                e.stopPropagation();
                var idx = window._months.indexOf(mk);
                if (idx > -1) {
                    window._months.splice(idx, 1);
                    // Switch to nearest month if needed
                    if (window._months.length > 0) {
                        activeMonthKey = window._months[Math.min(idx, window._months.length-1)];
                    }
                    renderMonthTabs();
                    renderAll();
                }
            };
            tab.appendChild(del);
        }

        // Click on tab itself (not the × button)
        tab.style.cursor = 'pointer';
        wrap.appendChild(tab);
    });
    if (isAdmin) {
        var add = document.createElement('div');
        add.className = 'm-tab-add';
        add.textContent = '+ Місяць';
        add.onclick = addMonth;
        wrap.appendChild(add);
    }
}

function addMonth() {
    var input = prompt('Введіть місяць (формат YYYY-MM, напр. 2026-06):');
    if (!input || !/^\d{4}-\d{2}$/.test(input)) return;
    if (!window._months.includes(input)) {
        window._months.push(input);
        window._months.sort();
    }
    activeMonthKey = input;
    renderMonthTabs();
    renderAll();
}

// ── RENDER ──
// Нормалізація ролі: "Кур'єр", "Кур'єри", "courier" → "courier"
function normalizeRole(role) {
    if (!role) return 'courier';
    var r = role.toLowerCase().trim();
    if (r === 'courier' || r === "кур'єр" || r === "кур'єри" || r === 'кур' || r === 'кур.') return 'courier';
    if (r === 'manager' || r === 'менеджер' || r === 'менеджери' || r === 'адмін' || r === 'admin') return 'manager';
    if (r === 'kitchen' || r === 'кухня' || r === 'кухар' || r === 'кухарі') return 'kitchen';
    // Для всіх інших — повертаємо як є (без змін), щоб кастомні ролі групувались разом
    return role.trim();
}

function roleLabel(role) {
    var r = normalizeRole(role);
    if (r === 'courier') return SL.role_courier + 'и';
    if (r === 'manager') return 'Менеджери';
    if (r === 'kitchen') return 'Кухня';
    return role.trim(); // кастомна роль — як є
}

function renderAll() {
    var container = document.getElementById('groups-container');
    container.innerHTML = '';

    // Групуємо по нормалізованій ролі
    var groups = {};
    var groupOrder = [];
    staffList.forEach(function(s) {
        var g = normalizeRole(s.role);
        if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
        groups[g].push(s);
    });

    groupOrder.forEach(function(role) {
        var card = buildGroupCard(roleLabel(role), groups[role], role);
        container.appendChild(card);
    });
}

function buildGroupCard(groupName, members, groupRole) {
    var _parts = activeMonthKey.split('-'); var y = parseInt(_parts[0]); var m = parseInt(_parts[1]);
    var daysInMonth = new Date(y, m, 0).getDate();
    var today = new Date();
    var todayDay = (today.getFullYear() === y && today.getMonth()+1 === m) ? today.getDate() : -1;

    var card = document.createElement('div');
    card.className = 'table-card';

    // Group header
    var gh = document.createElement('div');
    gh.className = 'group-header';
    var groupRoleKey = groupRole || '';
    gh.innerHTML = '<div class="group-name"' + (isAdmin ? ' contenteditable="true" data-role="' + groupRoleKey + '"' : '') + '>' + groupName + '</div>';
    if (isAdmin) {
        var nameDiv = gh.querySelector('.group-name');
        nameDiv.onblur = function() {
            var newName = (nameDiv.textContent || '').trim();
            var oldRole = nameDiv.getAttribute('data-role');
            if (!newName || newName === groupName) return;
            // Оновлюємо role у всіх членів групи в БД
            supabase.from('staff')
                .update({ role: newName })
                .eq('business_id', bizId)
                .eq('role', oldRole)
                .then(function(res) {
                    if (res.error) {
                        toast('❌ Помилка збереження назви');
                        nameDiv.textContent = groupName; // повертаємо стару назву
                    } else {
                        // Оновлюємо локальний staffList
                        staffList.forEach(function(s) {
                            if (s.role === oldRole) s.role = newName;
                        });
                        nameDiv.setAttribute('data-role', newName);
                        toast('✅ Назву групи збережено');
                    }
                });
        };
        // Enter = зберегти (blur)
        nameDiv.onkeydown = function(e) {
            if (e.keyCode === 13) { e.preventDefault(); nameDiv.blur(); }
        };
    }
    card.appendChild(gh);

    // Table
    var scroll = document.createElement('div');
    scroll.className = 'tbl-scroll';
    scroll.addEventListener('click', function(e) {
        var slot = e.target.closest('[data-edit="1"]');
        if (!slot) return;
        var cid = slot.getAttribute('data-cid');
        var day = parseInt(slot.getAttribute('data-day'));
        var name = slot.getAttribute('data-name');
        openSheet(cid, day, name);
    });

    var headDates = '', headDays = '', bodyRows = '';

    for (var d = 1; d <= daysInMonth; d++) {
        var dow = new Date(y, m-1, d).getDay(); // 0=Sun
        var dowIdx = dow === 0 ? 6 : dow - 1;
        var isToday = d === todayDay;
        headDates += '<th class="col-day-head' + (isToday?' today':'') + '"><div class="day-num">' + d + '</div></th>';
        headDays  += '<th class="col-day-head' + (isToday?' today':'') + '"><div class="day-name">' + DAY_NAMES[dowIdx] + '</div></th>';
    }

    members.forEach(function(s) {
        if (s._placeholder) return; // порожня група — пропускаємо
        var cid = String(s.user_id);
        var monthData = (scheduleData[activeMonthKey] || {})[cid] || {};

        // Worked days from shifts
        var workedDays = {};
        (shiftsData[cid] || []).forEach(function(sh) {
            var shDate = new Date((sh.started_at || '').replace(' ', 'T'));
            if (shDate.getFullYear() === y && shDate.getMonth()+1 === m) {
                var d = shDate.getDate();
                var hrs = sh.ended_at
                    ? ((new Date(sh.ended_at) - new Date(sh.started_at)) / 3600000).toFixed(1)
                    : null;
                workedDays[d] = hrs;
            }
        });

        var cells = '';
        var shiftCount = 0, hoursTotal = 0;

        for (var d = 1; d <= daysInMonth; d++) {
            var isToday = d === todayDay;
            var planned = !!monthData[d];
            var worked  = d in workedDays;
            var hrs     = workedDays[d];

            if (planned || worked) shiftCount++;
            if (hrs) hoursTotal += parseFloat(hrs);

            var canEdit = isAdmin;
            var slotClass = [
                'day-slot',
                planned ? 'planned' : '',
                worked  ? 'worked'  : ''
            ].filter(Boolean).join(' ');

            var startT = (monthData[d] && monthData[d].start) || '';
            var endT   = (monthData[d] && monthData[d].end)   || '';
            var editAttr = canEdit ? 'data-edit="1"' : '';
            var slotLabel = (monthData[d] && monthData[d].actual_hours != null)
                ? '<span class="slot-hours" style="color:var(--primary);">' + monthData[d].actual_hours + 'г</span>'
                : (startT ? '<span class="slot-hours">' + startT.slice(0,5) + '</span>' : '');

        }

        bodyRows += "\n<tr class=\"emp-row\" data-cid=\"" + cid + "\">" + "<td class=\"col-name\">" + s.name + "</td>" + cells + "<td class=\"cell-total\"><div class=\"badge-count badge-shifts\">" + shiftCount + "</div></td>" + "<td class=\"cell-total\"><div class=\"badge-count badge-hours\">" + (hoursTotal > 0 ? hoursTotal.toFixed(1).replace(".0","") : "0") + "</div></td>" + "</tr>";
    });

    scroll.innerHTML = "<table><thead>" + "<tr><th class=\"col-name\" rowspan=\"2\">' + SL.worker + '</th>" + headDates + "<th class=\"col-total-head\" rowspan=\"2\"><div class=\"day-name\">Змін</div></th>" + "<th class=\"col-total-head\" rowspan=\"2\"><div class=\"day-name\" style=\"color:var(--primary)\">Год.</div></th>" + "</tr><tr>" + headDays + "</tr>" + "</thead><tbody>" + bodyRows + "</tbody></table>";

    card.appendChild(scroll);

    if (isAdmin) {
        var addBtn = document.createElement('button');
        addBtn.className = 'btn-add-emp';
        addBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Додати співробітника';
        addBtn.onclick = function() { openStaffSheet(groupRole || (members[0] && members[0].role) || 'courier'); };
        card.appendChild(addBtn);
    }

    return card;
}

// ── SHEET ──
function openSheet(cid, day, name) {
    if (!isAdmin) return;
    var parts = activeMonthKey.split('-');
    var y = parseInt(parts[0]), m = parseInt(parts[1]);
    var dow = new Date(y, m-1, day).getDay();
    var dowIdx = dow === 0 ? 6 : dow - 1;

    activeCell = { cid: cid, day: day };
    var mk = scheduleData[activeMonthKey] || {};
    var cidData = mk[cid] || {};
    var existing = cidData[day] || {};

    document.getElementById('sheet-title').textContent = name + ' — ' + day + ' ' + DAY_NAMES[dowIdx];
    document.getElementById('time-start').value = (existing.start || '10:00').slice(0,5);
    document.getElementById('time-end').value   = (existing.end   || '22:00').slice(0,5);
    document.getElementById('actual-hours').value = existing.actual_hours != null ? existing.actual_hours : '';
    document.getElementById('overlay').classList.add('show');
}

function closeSheet() {
    document.getElementById('overlay').classList.remove('show');
    activeCell = null;
}

function setPlanned() {
    if (!activeCell) return;
    var cid = activeCell.cid; var day = activeCell.day;
    if (!scheduleData[activeMonthKey]) scheduleData[activeMonthKey] = {};
    if (!scheduleData[activeMonthKey][cid]) scheduleData[activeMonthKey][cid] = {};
    scheduleData[activeMonthKey][cid][day] = { planned: true, start: '10:00', end: '22:00' };
    closeSheet(); renderAll();
}

function clearSlot() {
    if (!activeCell) return;
    var cid = activeCell.cid; var day = activeCell.day;
    if (scheduleData[activeMonthKey] && scheduleData[activeMonthKey][cid] && scheduleData[activeMonthKey][cid][day]) {
        delete scheduleData[activeMonthKey][cid][day];
    }
    closeSheet(); renderAll();
}

function saveSlot() {
    if (!activeCell) return;
    var cid = activeCell.cid;
    var day = activeCell.day;
    var start = document.getElementById('time-start').value;
    var end   = document.getElementById('time-end').value;
    var actualRaw = document.getElementById('actual-hours').value;
    var actualHours = actualRaw !== '' ? parseFloat(actualRaw) : null;

    if (!scheduleData[activeMonthKey]) scheduleData[activeMonthKey] = {};
    if (!scheduleData[activeMonthKey][cid]) scheduleData[activeMonthKey][cid] = {};
    scheduleData[activeMonthKey][cid][day] = {
        planned: true,
        start: start,
        end: end,
        actual_hours: actualHours
    };
    closeSheet();
    renderAll();

    // Автозбереження одного слоту в БД
    var dd = String(parseInt(day)).padStart(2, '0');
    var dateStr = activeMonthKey + '-' + dd;
    supabase.from('schedule').upsert({
        business_id: bizId,
        courier_id: cid,
        date: dateStr,
        planned_start: start || null,
        planned_end: end || null,
        actual_hours: actualHours
    }, { onConflict: 'business_id,courier_id,date' }).then(function(res) {
        if (res.error) {
            toast('❌ Помилка збереження: ' + res.error.message);
        } else {
            toast('✅ Збережено');
        }
    });
}

// ── SAVE TO DB ──
// Тихе збереження конкретного місяця (без UI feedback)
async function saveScheduleForMonth(monthKey) {
    try {
        var parts = monthKey.split('-');
        var y = parseInt(parts[0]), m = parseInt(parts[1]);
        var daysInMonth = new Date(y, m, 0).getDate();
        var monthData = scheduleData[monthKey] || {};
        var upserts = [];

        Object.keys(monthData).forEach(function(cid) {
            var days = monthData[cid];
            Object.keys(days).forEach(function(day) {
                var val = days[day];
                var dd = String(parseInt(day)).padStart(2, '0');
                upserts.push({
                    business_id: bizId,
                    courier_id: cid,
                    date: monthKey + '-' + dd,
                    planned_start: val.start || null,
                    planned_end:   val.end   || null,
                    actual_hours:  val.actual_hours != null ? val.actual_hours : null
                });
            });
        });

        if (upserts.length > 0) {
            await supabase.from('schedule')
                .upsert(upserts, { onConflict: 'business_id,courier_id,date' });
        }
    } catch(e) {
        console.warn('[schedule] auto-save error:', e.message);
    }
}

async function saveSchedule() {
    var btn = document.querySelector('.btn-fab-primary');
    btn.textContent = 'Збереження...';
    btn.disabled = true;

    try {
        var _parts = activeMonthKey.split('-'); var y = parseInt(_parts[0]); var m = parseInt(_parts[1]);
        var daysInMonth = new Date(y, m, 0).getDate();
        var monthData = scheduleData[activeMonthKey] || {};

        var upserts = [];
        Object.keys(monthData).forEach(function(cid) {
            var days = monthData[cid];
            Object.keys(days).forEach(function(day) {
                var val = days[day];
                var dd = String(parseInt(day)).padStart(2,'0');
                var dateStr = activeMonthKey + '-' + dd;
                upserts.push({
                    business_id: bizId,
                    courier_id: cid,
                    date: dateStr,
                    planned_start: val.start || null,
                    planned_end:   val.end   || null,
                    actual_hours:  val.actual_hours != null ? val.actual_hours : null
                });
            });
        });

        if (upserts.length > 0) {
            await supabase.from('schedule')
                .upsert(upserts, { onConflict: 'business_id,courier_id,date' });
        }

        // Delete cleared slots (those in DB but not in current data)
        var startDate = activeMonthKey + "-01";
        var endDate   = activeMonthKey + "-" + (daysInMonth < 10 ? "0" : "") + daysInMonth;
        var _res = await supabase.from('schedule')
            .select('id, courier_id, date')
            .eq('business_id', bizId)
            .gte('date', startDate).lte('date', endDate); var existing = _res.data;

        var toDelete = (existing || []).filter(function(r) {

            var day = parseInt(r.date.slice(8,10));
            return !(monthData[cid] && monthData[cid][day]);
        }).map(function(r) { return r.id; });

        if (toDelete.length > 0) {
            await supabase.from('schedule').delete().in('id', toDelete);
        }

        toast('✅ Графік збережено');
    } catch(e) {

    } finally {
        btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Зберегти';
        btn.disabled = false;
    }
}

// ── EARNINGS ──
async function loadEarnings() {
    if (userRole === 'owner') return;
    if (!userId) return;

    try {
        var _parts = activeMonthKey.split('-'); var y = parseInt(_parts[0]); var m = parseInt(_parts[1]);
        if (!y || !m) return;

        var startDate = new Date(y, m-1, 1).toISOString();
        var endDate   = new Date(y, m, 1).toISOString();
        var cid = userId;

        // Salary settings
        var sset = null;
        try {
            var _res = await supabase.from('salary_settings')
                .select('*').eq('business_id', bizId).eq('courier_id', cid).maybeSingle(); var data = _res.data;
            sset = data;
        } catch(e) {}

        var hourlyRate = sset ? (parseFloat(sset.hourly_rate) || 0) : 0;
        var kmRate     = (sset && sset.km_enabled) ? (parseFloat(sset.km_rate) || parseFloat(bizData && bizData.km_rate) || 0) : 0;
        var orderRate  = (sset && sset.order_enabled) ? (parseFloat(sset.order_rate) || 0) : 0;

        // Розрахунок ПО ДНЯХ (Gemini fix)
        var totalHours = 0, totalKm = 0, shiftCount = 0;

        // 1. Збираємо реальні години з боту по днях
        var realDaily = {};
        try {
            var _res = await supabase.from('shifts')
                .select('*').eq('courier_id', cid).eq('business_id', bizId)
                .gte('started_at', startDate).lt('started_at', endDate);
            var myShifts = _res.data;
            (myShifts || []).forEach(function(s) {
                var dd = new Date((s.started_at || '').replace(' ', 'T')).getDate();
                if (!realDaily[dd]) realDaily[dd] = { hours: 0, km: 0, shifts: 0 };
                realDaily[dd].shifts++;
                if (s.ended_at) {
                    realDaily[dd].hours += (new Date((s.ended_at || '').replace(' ', 'T')) - new Date((s.started_at || '').replace(' ', 'T'))) / 3600000;
                    if (s.end_km && s.start_km) totalKm += (s.end_km - s.start_km);
                } else {
                    realDaily[dd].hours += (new Date() - new Date((s.started_at || '').replace(' ', 'T'))) / 3600000;
                }
            });
        } catch(e) {}

        // 2. Рахуємо по кожному дню окремо
        var monthSched = (scheduleData[activeMonthKey] || {})[String(cid)] || {};
        var daysInMonth = new Date(y, m, 0).getDate();

        for (var dd = 1; dd <= daysInMonth; dd++) {
            var slot = monthSched[dd];
            var realDay = realDaily[dd];
            var dayHours = 0;
            var workedToday = false;

            if (slot && slot.actual_hours != null && !isNaN(slot.actual_hours)) {
                // Найвищий пріоритет: ручне введення
                dayHours = parseFloat(slot.actual_hours);
                workedToday = true;
            } else if (realDay && realDay.hours > 0) {
                // Середній: реальні години з боту
                dayHours = realDay.hours;
                workedToday = true;
            } else if (slot && slot.planned && slot.start && slot.end) {
                // Найнижчий: планові години
                var ps = slot.start.split(':');
                var pe = slot.end.split(':');
                var diff = (parseInt(pe[0])*60 + parseInt(pe[1])) - (parseInt(ps[0])*60 + parseInt(ps[1]));
                if (diff < 0) diff += 24 * 60; // нічна зміна через північ
                if (diff > 0) { dayHours = diff / 60; workedToday = true; }
            }

            totalHours += dayHours;
            if (workedToday || (realDay && realDay.shifts > 0)) shiftCount++;
        }
        totalHours = Math.round(totalHours * 10) / 10;

        // Orders
        var ordersCount = 0;
        try {
            var _res = await supabase.from('orders')
                .select('*', { count: 'exact', head: true })
                .eq('courier_id', cid).eq('business_id', bizId)
                .eq('status', 'completed')
                .gte('created_at', startDate).lt('created_at', endDate); var count = _res.count;
            ordersCount = count || 0;
        } catch(e) {}

        // Bonuses
        var bonusTotal = 0;
        try {
            var _res = await supabase.from('salary_bonuses')
                .select('amount').eq('business_id', bizId).eq('courier_id', cid)
                .eq('month', activeMonthKey); var bonuses = _res.data;
            bonusTotal = (bonuses || []).reduce(function(s, b) { return s + (parseFloat(b.amount) || 0); }, 0);
        } catch(e) {}

        var safeHours = isNaN(totalHours) ? 0 : totalHours;
        var earned = (safeHours * hourlyRate) + (ordersCount * orderRate) + (totalKm * kmRate) + bonusTotal;

        var earnedSafe = isNaN(earned) ? 0 : Math.max(0, earned);
        var cur = bizData ? (bizData.currency || 'zł') : 'zł';

        // Update UI safely
        var el;
        el = document.getElementById('earn-total');
        if (el) el.innerHTML = earnedSafe.toFixed(2) + ' <span style="font-size:18px;opacity:0.8;">' + cur + '</span>';
        el = document.getElementById('earn-hours');
        if (el) el.textContent = totalHours.toFixed(1) + ' год';
        el = document.getElementById('earn-shifts-count');
        if (el) el.textContent = shiftCount + ' змін';
        el = document.getElementById('earn-orders');
        if (el) el.textContent = ordersCount + ' зам.';
        el = document.getElementById('earn-currency');
        if (el) el.textContent = cur;

        var earnSection = document.getElementById('earn-section');
        if (earnSection) earnSection.style.display = '';

    } catch(e) {
        console.warn('[schedule] loadEarnings error:', e.message);
    }
}
</script>
</body>
</html>
